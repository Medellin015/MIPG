/* ===== 3.17 Pestaña FURAG (resultados por vigencia) ===== */

const DeltaPuntaje = ({ actual, anterior }) => {
  if (actual == null || anterior == null) return null;
  const dif = Math.round(actual - anterior);
  if (!dif) return <span className="ml-1 text-[10px] text-slate-400">=</span>;
  return (
    <span className={'ml-1 text-[10px] font-bold ' + (dif > 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400')}>
      {dif > 0 ? '▲' : '▼'}{Math.abs(dif)}
    </span>
  );
};

const FuragTab = ({ ctx }) => {
  const d = ctx.datosMipg;
  if (d === null) {
    return <p className="rounded-xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-400 dark:border-slate-700 dark:bg-slate-900" role="status">Cargando el FURAG…</p>;
  }
  const vigencias = [...d.furag].sort((a, b) => (+a.vigencia) - (+b.vigencia)); // ascendente para leer la evolución

  const autodiagDe = (polId) => {
    const pol = politicaPorId(polId);
    return puntajeAutodiag(d.autodiagnosticos.find(x => x.politicaId === polId), pol);
  };
  const puntajesAutod = POLITICAS.map(p => autodiagDe(p.id)).filter(x => x != null);
  const autodProm = puntajesAutod.length
    ? Math.round(puntajesAutod.reduce((a, b) => a + b, 0) / puntajesAutod.length) : null;

  const filas = [
    { clave: '_indice', nombre: 'Índice de desempeño institucional', esIndice: true },
    ...POLITICAS.map(p => ({ clave: p.id, nombre: p.nombre, dim: p.dim }))
  ];
  const valorDe = (doc, fila) => {
    if (!doc) return null;
    const v = fila.esIndice ? doc.indice : (doc.valores || {})[fila.clave];
    return v == null || v === '' ? null : Math.round(+v);
  };

  const exportar = () => {
    const cab = ['Política', ...vigencias.map(v => 'FURAG ' + v.vigencia), 'Autodiagnóstico actual'];
    const filasX = [cab];
    filas.forEach(f => filasX.push([
      f.esIndice ? f.nombre : 'D' + f.dim + ' · ' + f.nombre,
      ...vigencias.map(v => { const x = valorDe(v, f); return x == null ? '' : x; }),
      f.esIndice ? (autodProm == null ? '' : autodProm) : (autodiagDe(f.clave) == null ? '' : autodiagDe(f.clave))
    ]));
    exportarLibro('furag_' + (ctx.entidad.sigla || 'ENT').toLowerCase() + '_' + hoyISO(),
      [{ nombre: 'FURAG', filas: filasX, anchos: [46, ...vigencias.map(() => 12), 16] }], ctx.avisar);
  };

  return (
    <div className="animar-subir space-y-5">
      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
        <div className="flex flex-wrap items-center justify-between gap-2">
          <TituloSeccion>Resultados FURAG por vigencia</TituloSeccion>
          <div className="flex flex-wrap gap-2">
            <button className={CLS_BOTON_SECUNDARIO} onClick={exportar} disabled={!vigencias.length}>
              <IcoDescarga /> Exportar
            </button>
            {ctx.puedeEditar && (
              <button className={CLS_BOTON_PRIMARIO} onClick={() => ctx.abrirModal({ tipo: 'furag', props: {} })}>
                <IcoMas /> Registrar vigencia
              </button>
            )}
          </div>
        </div>
        <p className="mt-2 text-xs text-slate-400">
          Registra los puntajes oficiales que publica Función Pública y compáralos entre vigencias y con el autodiagnóstico interno.
        </p>
      </section>

      {vigencias.length === 0 ? (
        <div className="rounded-xl border border-dashed border-slate-300 bg-white p-10 text-center text-sm text-slate-500 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-400" role="status">
          Aún no hay vigencias registradas.
          {ctx.puedeEditar && ' Usa "Registrar vigencia" para capturar los resultados oficiales.'}
        </div>
      ) : (
        <div className="overflow-x-auto rounded-xl border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-900">
          <table className="w-full min-w-[720px] text-sm">
            <thead className="bg-slate-50 text-left text-[11px] uppercase tracking-wide text-slate-500 dark:bg-slate-800 dark:text-slate-400">
              <tr>
                <th className="col-fija z-10 bg-slate-50 px-3 py-2.5 dark:bg-slate-800">Política</th>
                {vigencias.map(v => (
                  <th key={v.id} className="whitespace-nowrap px-3 py-2.5 text-center">
                    <span className="inline-flex items-center gap-1">
                      {v.vigencia}
                      {ctx.puedeEditar && (
                        <button aria-label={'Editar la vigencia ' + v.vigencia}
                          className="rounded p-0.5 text-slate-400 hover:bg-slate-200 hover:text-tinta dark:hover:bg-slate-700"
                          onClick={() => ctx.abrirModal({ tipo: 'furag', props: { vigencia: v.vigencia } })}>
                          <IcoLapiz className="h-3 w-3" />
                        </button>
                      )}
                    </span>
                  </th>
                ))}
                <th className="px-3 py-2.5 text-center">Autodiag.</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
              {filas.map(f => (
                <tr key={f.clave} className={f.esIndice ? 'bg-tinta-tenue/50 dark:bg-slate-800/60' : ''}>
                  <td className={'col-fija px-3 py-2 dark:bg-slate-900 ' +
                      (f.esIndice ? 'bg-tinta-tenue/50 font-bold text-tinta dark:bg-slate-800 dark:text-slate-100' : 'bg-white text-slate-600 dark:text-slate-300')}>
                    {f.esIndice ? f.nombre : (
                      <span className="flex items-center gap-1.5">
                        <span className="text-[10px] font-bold text-slate-400">D{f.dim}</span>
                        <span className="linea-2">{f.nombre}</span>
                      </span>
                    )}
                  </td>
                  {vigencias.map((v, i) => {
                    const actual = valorDe(v, f);
                    const anterior = i > 0 ? valorDe(vigencias[i - 1], f) : null;
                    return (
                      <td key={v.id} className="whitespace-nowrap px-3 py-2 text-center">
                        <ChipPuntaje p={actual} />
                        <DeltaPuntaje actual={actual} anterior={anterior} />
                      </td>
                    );
                  })}
                  <td className="px-3 py-2 text-center">
                    <ChipPuntaje p={f.esIndice ? autodProm : autodiagDe(f.clave)} />
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

/* --- Registro / edición de una vigencia FURAG --- */
const ModalFurag = ({ props, alCerrar, ctx }) => {
  const existentes = (ctx.datosMipg && ctx.datosMipg.furag) || [];
  const original = props.vigencia != null
    ? existentes.find(x => +x.vigencia === +props.vigencia) : null;
  const [vig, setVig] = useState(original ? original.vigencia : new Date().getFullYear() - 1);
  const [indice, setIndice] = useState(original && original.indice != null ? String(original.indice) : '');
  const [vals, setVals] = useState(() => {
    const base = {};
    if (original && original.valores) Object.keys(original.valores).forEach(k => { base[k] = String(original.valores[k]); });
    return base;
  });
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);

  const ponVal = (id, v) => setVals(prev => {
    const n = { ...prev };
    if (v === '') delete n[id]; else n[id] = v;
    return n;
  });

  const guardar = async () => {
    const vigNum = parseInt(vig, 10);
    if (!vigNum || vigNum < 2015 || vigNum > 2100) { setError('Escribe una vigencia válida.'); return; }
    const clamp = (x) => Math.max(0, Math.min(100, Math.round(+x)));
    const valores = {};
    Object.keys(vals).forEach(k => { if (vals[k] !== '' && !isNaN(+vals[k])) valores[k] = clamp(vals[k]); });
    const indiceNum = indice === '' || isNaN(+indice) ? null : clamp(indice);
    if (indiceNum == null && !Object.keys(valores).length) {
      setError('Registra al menos el índice o el puntaje de una política.'); return;
    }
    setGuardando(true); setError('');
    try {
      const objetivo = original || existentes.find(x => +x.vigencia === vigNum) || null;
      const ahora = new Date().toISOString();
      const datos = { entidadId: ctx.entidad.id, vigencia: vigNum, valores, indice: indiceNum,
        actualizadoEn: ahora, actualizadoPor: ctx.usuario.usuario };
      if (objetivo) await DB.actualizarDe('furag', objetivo.id, datos);
      else await DB.crearDe('furag', { ...datos, creadoEn: ahora });
      ctx.registrar('Registró FURAG', 'FURAG',
        'Vigencia ' + vigNum + (indiceNum != null ? ' · índice ' + indiceNum : ''));
      ctx.avisar('FURAG ' + vigNum + ' guardado');
      await ctx.recargarMipg();
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar la vigencia.');
      setGuardando(false);
    }
  };

  return (
    <Ventana titulo={original ? 'Editar FURAG ' + original.vigencia : 'Registrar vigencia FURAG'}
      subtitulo="Puntajes oficiales de 0 a 100 por política" ancho="max-w-xl" alCerrar={alCerrar}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>
          {guardando ? 'Guardando…' : 'Guardar vigencia'}
        </button>
      </>}>
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label htmlFor="f-vig" className={CLS_ETIQUETA}>Vigencia</label>
            <input id="f-vig" type="number" min="2015" max="2100" className={CLS_INPUT}
              value={vig} disabled={!!original} onChange={e => setVig(e.target.value)} />
          </div>
          <div>
            <label htmlFor="f-ind" className={CLS_ETIQUETA}>Índice de desempeño</label>
            <input id="f-ind" type="number" min="0" max="100" className={CLS_INPUT}
              value={indice} onChange={e => setIndice(e.target.value)} placeholder="0-100" />
          </div>
        </div>
        <ul className="space-y-1.5">
          {POLITICAS.map(p => (
            <li key={p.id} className="flex items-center gap-2">
              <span className="w-8 shrink-0 text-[10px] font-bold text-slate-400">D{p.dim}</span>
              <span className="min-w-0 flex-1 truncate text-sm text-slate-600 dark:text-slate-300" title={p.nombre}>{p.nombre}</span>
              <input aria-label={'Puntaje FURAG de ' + p.nombre} type="number" min="0" max="100"
                className={CLS_INPUT + ' w-24 text-center'} placeholder="—"
                value={vals[p.id] != null ? vals[p.id] : ''} onChange={e => ponVal(p.id, e.target.value)} />
            </li>
          ))}
        </ul>
      </div>
    </Ventana>
  );
};

/* ===== 3.18 Montaje ===== */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
