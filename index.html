          ) : <p className="text-sm text-slate-400">Sin controles registrados.</p>}
        </div>

        {(r.plan || []).length > 0 && (
          <div>
            <h4 className="mb-2 text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Plan de acción</h4>
            <div className="overflow-x-auto">
              <table className="w-full min-w-[520px] text-sm">
                <thead className="text-left text-[11px] uppercase text-slate-400">
                  <tr><th className="py-1 pr-3">Acción</th><th className="py-1 pr-3">Responsable</th><th className="py-1 pr-3">Fecha</th><th className="py-1">Estado</th></tr>
                </thead>
                <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                  {r.plan.map((a, i) => (
                    <tr key={i}>
                      <td className="py-1.5 pr-3 text-slate-600 dark:text-slate-300">{a.descripcion}</td>
                      <td className="py-1.5 pr-3 text-slate-500">{a.responsable || '—'}</td>
                      <td className={'py-1.5 pr-3 whitespace-nowrap ' + (accionVencida(a) ? 'font-semibold text-red-700 dark:text-red-400' : 'text-slate-500')}>{formatearFecha(a.fecha)}</td>
                      <td className="py-1.5">{accionVencida(a) ? <Etiqueta texto="Vencida" /> : <Etiqueta texto={a.estado} />}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        <div>
          <div className="mb-2 flex items-center justify-between gap-2">
            <h4 className="text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Seguimientos ({segs.length})</h4>
            {ctx.puedeEditar && (
              <button className={CLS_BOTON_SECUNDARIO} onClick={() => ctx.abrirModal({ tipo: 'seguimiento', props: { riesgoId: r.id } })}>
                <IcoReloj /> Registrar seguimiento
              </button>
            )}
          </div>
          {segs.length ? (
            <ol className="space-y-3 border-l-2 border-tinta-tenue pl-4 dark:border-slate-700">
              {segs.map((s, i) => (
                <li key={i} className="relative">
                  <span className="absolute -left-[21px] top-1.5 h-2.5 w-2.5 rounded-full bg-tinta dark:bg-tinta-claro" aria-hidden="true"></span>
                  <div className="flex flex-wrap items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
                    <strong className="text-slate-700 dark:text-slate-200">{formatearFecha(s.fecha)}</strong>
                    <span>{s.periodo}</span>
                    {s.eficacia && <Etiqueta texto={s.eficacia} />}
                  </div>
                  <p className="mt-0.5 text-sm text-slate-600 dark:text-slate-300">{s.observacion}</p>
                  {s.evidencia && (
                    /^https?:\/\//i.test(s.evidencia)
                      ? <a href={s.evidencia} target="_blank" rel="noopener noreferrer" className="break-all text-xs font-medium text-tinta underline dark:text-tinta-claro">{s.evidencia}</a>
                      : <p className="text-xs text-slate-500 dark:text-slate-400">Evidencia: {s.evidencia}</p>
                  )}
                  <p className="mt-0.5 text-[11px] text-slate-400">Registró: {s.usuario || '—'}</p>
                </li>
              ))}
            </ol>
          ) : <p className="text-sm text-slate-400">Aún sin seguimientos.</p>}
        </div>

        <details className="rounded-lg border border-slate-200 p-3 dark:border-slate-700" onToggle={cargarHistorial}>
          <summary className="cursor-pointer text-sm font-semibold text-tinta dark:text-slate-200">Historial de cambios del riesgo</summary>
          {historial === null ? (
            <p className="mt-2 text-sm text-slate-400">Cargando…</p>
          ) : historial.length === 0 ? (
            <p className="mt-2 text-sm text-slate-400">Sin registros para este riesgo.</p>
          ) : (
            <ul className="mt-2 space-y-1.5 text-xs text-slate-600 dark:text-slate-300">
              {historial.map(h => (
                <li key={h.id}>
                  <strong>{formatearFechaHora(h.fecha)}</strong> · {h.usuario} · {h.accion}
                  {h.detalle ? <span className="text-slate-400"> — {h.detalle}</span> : null}
                </li>
              ))}
            </ul>
          )}
        </details>
      </div>
    </Ventana>
  );
};

/* --- Registro de seguimiento periódico --- */
const ModalSeguimiento = ({ props, alCerrar, ctx }) => {
  const [riesgoId, setRiesgoId] = useState(props.riesgoId || '');
  const [s, setS] = useState({ fecha: hoyISO(), periodo: periodoActual(), eficacia: 'Eficaz', observacion: '', evidencia: '' });
  const [materializado, setMaterializado] = useState(false);
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);
  const pon = (k) => (e) => setS(prev => ({ ...prev, [k]: e.target.value }));
  const riesgo = ctx.riesgosCalc.find(r => r.id === riesgoId);

  const guardar = async () => {
    if (!riesgo) { setError('Selecciona el riesgo.'); return; }
    if (!String(s.observacion || '').trim()) { setError('Escribe la observación del seguimiento.'); return; }
    setGuardando(true); setError('');
    try {
      await DB.agregarSeguimiento(riesgo.id, {
        ...s, observacion: String(s.observacion).trim(),
        usuario: ctx.usuario.usuario, registradoEn: new Date().toISOString()
      });
      if (materializado && riesgo.estado !== 'Materializado') {
        await DB.actualizarRiesgo(riesgo.id, { estado: 'Materializado', actualizadoEn: new Date().toISOString() });
        ctx.registrar('Marcó materialización', riesgo.codigo, s.periodo);
      }
      ctx.registrar('Registró seguimiento', riesgo.codigo, s.periodo + ' · ' + s.eficacia);
      ctx.avisar('Seguimiento de ' + riesgo.codigo + ' registrado');
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar el seguimiento.');
      setGuardando(false);
    }
  };

  return (
    <Ventana titulo="Registrar seguimiento" ancho="max-w-lg" alCerrar={alCerrar}
      subtitulo={riesgo ? riesgo.codigo + ' · ' + riesgo.nombre.slice(0, 70) : 'Seguimiento periódico del riesgo'}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>{guardando ? 'Guardando…' : 'Guardar seguimiento'}</button>
      </>}>
      <div className="space-y-4">
        {!props.riesgoId && (
          <div>
            <label htmlFor="s-riesgo" className={CLS_ETIQUETA}>Riesgo</label>
            <select id="s-riesgo" className={CLS_INPUT} value={riesgoId} onChange={e => setRiesgoId(e.target.value)}>
              <option value="">Selecciona…</option>
              {ordenarRiesgos(ctx.riesgosCalc.filter(r => r.estado !== 'Cerrado')).map(r => (
                <option key={r.id} value={r.id}>{r.codigo} — {r.nombre.slice(0, 60)}</option>
              ))}
            </select>
          </div>
        )}
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
          <div>
            <label htmlFor="s-fecha" className={CLS_ETIQUETA}>Fecha</label>
            <input id="s-fecha" type="date" className={CLS_INPUT} value={s.fecha} onChange={pon('fecha')} />
          </div>
          <div>
            <label htmlFor="s-periodo" className={CLS_ETIQUETA}>Periodo</label>
            <input id="s-periodo" className={CLS_INPUT} value={s.periodo} onChange={pon('periodo')} placeholder="T3-2026" />
          </div>
          <div>
            <label htmlFor="s-eficacia" className={CLS_ETIQUETA}>Eficacia del control</label>
            <select id="s-eficacia" className={CLS_INPUT} value={s.eficacia} onChange={pon('eficacia')}>
              {EFICACIAS.map(x => <option key={x} value={x}>{x}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label htmlFor="s-obs" className={CLS_ETIQUETA}>Observación</label>
          <textarea id="s-obs" rows="3" className={CLS_INPUT} value={s.observacion} autoFocus={!!props.riesgoId}
            onChange={pon('observacion')} placeholder="Qué se revisó, resultado y compromisos…" />
        </div>
        <div>
          <label htmlFor="s-evid" className={CLS_ETIQUETA}>Evidencia (enlace o referencia)</label>
          <input id="s-evid" className={CLS_INPUT} value={s.evidencia} onChange={pon('evidencia')}
            placeholder="https://… o número de acta / memorando" />
        </div>
        <label className="flex cursor-pointer items-start gap-2 rounded-lg border border-slate-200 p-3 text-sm dark:border-slate-700">
          <input type="checkbox" className="mt-0.5" checked={materializado} onChange={e => setMaterializado(e.target.checked)} />
          <span className="text-slate-600 dark:text-slate-300">
            El riesgo <strong>se materializó</strong> en este periodo (el estado del riesgo pasará a Materializado).
          </span>
        </label>
      </div>
    </Ventana>
  );
};

/* ===== 3.10 Pestaña Seguimiento ===== */

const SeguimientoTab = ({ riesgosCalc, ctx }) => {
  const [filtroAccion, setFiltroAccion] = useState('todas');
  const [filtroPeriodo, setFiltroPeriodo] = useState('');

  const acciones = [];
  riesgosCalc.filter(r => r.estado !== 'Cerrado').forEach(r =>
    (r.plan || []).forEach((a, idx) => acciones.push({ r, a, idx })));

  const conteos = {
    todas: acciones.length,
    vencidas: acciones.filter(x => accionVencida(x.a)).length,
    abiertas: acciones.filter(x => x.a.estado !== 'Cumplida' && !accionVencida(x.a)).length,
    cumplidas: acciones.filter(x => x.a.estado === 'Cumplida').length
  };
  const accionesVisibles = acciones.filter(x =>
    filtroAccion === 'todas' ? true :
    filtroAccion === 'vencidas' ? accionVencida(x.a) :
    filtroAccion === 'abiertas' ? (x.a.estado !== 'Cumplida' && !accionVencida(x.a)) :
    x.a.estado === 'Cumplida'
  ).sort((x, y) => String(x.a.fecha || '9999').localeCompare(String(y.a.fecha || '9999')));

  const cambiarEstadoAccion = async (x, nuevo) => {
    try {
      const plan = clonar(x.r.plan || []);
      plan[x.idx] = { ...plan[x.idx], estado: nuevo };
      await DB.actualizarRiesgo(x.r.id, { plan, actualizadoEn: new Date().toISOString() });
      ctx.registrar('Cambió estado de acción', x.r.codigo, '"' + String(x.a.descripcion).slice(0, 60) + '" → ' + nuevo);
    } catch (e) { console.error(e); ctx.avisar('No fue posible actualizar la acción', 'error'); }
  };

  const segs = [];
  riesgosCalc.forEach(r => (r.seguimientos || []).forEach(s => segs.push({ r, s })));
  segs.sort((a, b) => String(b.s.fecha).localeCompare(String(a.s.fecha)));
  const periodos = [...new Set(segs.map(x => x.s.periodo).filter(Boolean))].sort().reverse();
  const segsVisibles = segs.filter(x => !filtroPeriodo || x.s.periodo === filtroPeriodo);

  return (
    <div className="animar-subir space-y-5">
      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
        <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
          <TituloSeccion>Acciones del plan</TituloSeccion>
          <div className="flex flex-wrap gap-1.5" role="group" aria-label="Filtrar acciones">
            {[['todas', 'Todas'], ['vencidas', 'Vencidas'], ['abiertas', 'En curso'], ['cumplidas', 'Cumplidas']].map(([v, nombre]) => (
              <button key={v} onClick={() => setFiltroAccion(v)}
                className={'rounded-full px-3 py-1 text-xs font-semibold transition-colors ' +
                  (filtroAccion === v ? 'bg-tinta text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-300')}>
                {nombre} · {conteos[v]}
              </button>
            ))}
          </div>
        </div>
        {accionesVisibles.length ? (
          <div className="overflow-x-auto">
            <table className="w-full min-w-[760px] text-sm">
              <thead className="text-left text-[11px] uppercase tracking-wide text-slate-400">
                <tr>
                  <th className="py-2 pr-3">Riesgo</th><th className="py-2 pr-3">Acción</th>
                  <th className="py-2 pr-3">Responsable</th><th className="py-2 pr-3">Fecha límite</th><th className="py-2">Estado</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                {accionesVisibles.map((x, i) => (
                  <tr key={x.r.id + '-' + x.idx + '-' + i} className="align-top">
                    <td className="whitespace-nowrap py-2 pr-3 text-xs font-bold text-slate-600 dark:text-slate-300">{x.r.codigo}</td>
                    <td className="py-2 pr-3 text-slate-600 dark:text-slate-300">{x.a.descripcion}</td>
                    <td className="py-2 pr-3 text-slate-500">{x.a.responsable || '—'}</td>
                    <td className={'whitespace-nowrap py-2 pr-3 ' + (accionVencida(x.a) ? 'font-semibold text-red-700 dark:text-red-400' : 'text-slate-500')}>
                      {formatearFecha(x.a.fecha)}{accionVencida(x.a) && <span className="ml-1.5 align-middle"><Etiqueta texto="Vencida" /></span>}
                    </td>
                    <td className="py-2">
                      {ctx.puedeEditar ? (
                        <select aria-label={'Estado de la acción de ' + x.r.codigo}
                          className="rounded-md border border-slate-300 bg-white px-2 py-1 text-xs dark:border-slate-600 dark:bg-slate-800"
                          value={x.a.estado} onChange={e => cambiarEstadoAccion(x, e.target.value)}>
                          {ESTADOS_ACCION.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      ) : <Etiqueta texto={x.a.estado} />}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : <p className="text-sm text-slate-500 dark:text-slate-400">No hay acciones en este filtro.</p>}
      </section>

      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
        <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
          <TituloSeccion>Bitácora de seguimientos</TituloSeccion>
          <div className="flex flex-wrap items-center gap-2">
            <select aria-label="Filtrar por periodo" className={CLS_INPUT + ' w-auto'} value={filtroPeriodo} onChange={e => setFiltroPeriodo(e.target.value)}>
              <option value="">Todos los periodos</option>
              {periodos.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            {ctx.puedeEditar && (
              <button className={CLS_BOTON_PRIMARIO} onClick={() => ctx.abrirModal({ tipo: 'seguimiento', props: {} })}>
                <IcoReloj /> Registrar seguimiento
              </button>
            )}
          </div>
        </div>
        {segsVisibles.length ? (
          <div className="overflow-x-auto">
            <table className="w-full min-w-[820px] text-sm">
              <thead className="text-left text-[11px] uppercase tracking-wide text-slate-400">
                <tr>
                  <th className="py-2 pr-3">Fecha</th><th className="py-2 pr-3">Periodo</th><th className="py-2 pr-3">Riesgo</th>
                  <th className="py-2 pr-3">Eficacia</th><th className="py-2 pr-3">Observación</th><th className="py-2 pr-3">Evidencia</th><th className="py-2">Registró</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                {segsVisibles.map((x, i) => (
                  <tr key={i} className="align-top">
                    <td className="whitespace-nowrap py-2 pr-3 text-slate-600 dark:text-slate-300">{formatearFecha(x.s.fecha)}</td>
                    <td className="whitespace-nowrap py-2 pr-3 text-slate-500">{x.s.periodo}</td>
                    <td className="py-2 pr-3">
                      <button className="text-xs font-bold text-tinta underline-offset-2 hover:underline dark:text-tinta-claro"
                        onClick={() => ctx.abrirModal({ tipo: 'ver', props: { riesgoId: x.r.id } })}>{x.r.codigo}</button>
                    </td>
                    <td className="py-2 pr-3">{x.s.eficacia ? <Etiqueta texto={x.s.eficacia} /> : '—'}</td>
                    <td className="max-w-[340px] py-2 pr-3 text-slate-600 dark:text-slate-300">
                      <span className="linea-2" title={x.s.observacion}>{x.s.observacion}</span>
                    </td>
                    <td className="max-w-[180px] py-2 pr-3 text-xs">
                      {x.s.evidencia
                        ? (/^https?:\/\//i.test(x.s.evidencia)
                          ? <a href={x.s.evidencia} target="_blank" rel="noopener noreferrer" className="break-all font-medium text-tinta underline dark:text-tinta-claro">Enlace</a>
                          : <span className="text-slate-500">{x.s.evidencia}</span>)
                        : '—'}
                    </td>
                    <td className="whitespace-nowrap py-2 text-xs text-slate-500">{x.s.usuario || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : <p className="text-sm text-slate-500 dark:text-slate-400">Sin seguimientos registrados{filtroPeriodo ? ' en ' + filtroPeriodo : ''}.</p>}
      </section>
    </div>
  );
};

/* --- Crear / editar entidad (nombre, sigla y sus procesos) --- */
const ModalEntidad = ({ props, alCerrar, ctx }) => {
  const original = props.entidadId ? (ctx.catalogoEntidades || []).find(e => e.id === props.entidadId) : null;
  const [e, setE] = useState(() => original ? clonar(original) : { nombre: '', sigla: '', nit: '', activo: true, procesos: [] });
  const [nuevoProceso, setNuevoProceso] = useState('');
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);
  const pon = (k) => (ev) => setE(prev => ({ ...prev, [k]: ev.target.value }));

  const agregarProceso = () => {
    const p = nuevoProceso.trim();
    if (!p) return;
    if ((e.procesos || []).some(x => x.toLowerCase() === p.toLowerCase())) { setNuevoProceso(''); return; }
    setE(prev => ({ ...prev, procesos: [...(prev.procesos || []), p] }));
    setNuevoProceso('');
  };
  const quitarProceso = (p) => setE(prev => ({ ...prev, procesos: prev.procesos.filter(x => x !== p) }));

  const guardar = async () => {
    if (!e.nombre.trim()) { setError('Escribe el nombre de la entidad.'); return; }
    if (!String(e.sigla || '').trim()) { setError('Escribe la sigla (se usa en los códigos de riesgo).'); return; }
    setGuardando(true); setError('');
    const datos = {
      nombre: e.nombre.trim(), sigla: String(e.sigla).trim().toUpperCase(),
      nit: (e.nit || '').trim(), activo: e.activo !== false, procesos: e.procesos || []
    };
    try {
      let id = props.entidadId;
      if (id) {
        await DB.actualizarEntidad(id, datos);
      } else {
        id = await DB.crearEntidad({ ...datos, creadoEn: new Date().toISOString() });
      }
      DB.registrarHistorial(id, {
        fecha: new Date().toISOString(), usuario: ctx.usuario.usuario, riesgoCodigo: '',
        accion: props.entidadId ? 'Actualizó la entidad' : 'Creó la entidad', detalle: datos.nombre
      }).catch(() => {});
      await ctx.refrescarEntidades();
      ctx.avisar('Entidad ' + datos.sigla + ' guardada');
      alCerrar();
    } catch (err) {
      console.error(err);
      setError('No fue posible guardar la entidad.');
      setGuardando(false);
    }
  };

  return (
    <Ventana titulo={original ? 'Editar entidad' : 'Nueva entidad'} ancho="max-w-lg" alCerrar={alCerrar}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>{guardando ? 'Guardando…' : 'Guardar entidad'}</button>
      </>}>
      <div className="space-y-4">
        <div>
          <label htmlFor="e-nombre" className={CLS_ETIQUETA}>Nombre de la entidad</label>
          <input id="e-nombre" className={CLS_INPUT} value={e.nombre} autoFocus onChange={pon('nombre')}
            placeholder="Ej.: Empresa de Parques y Eventos de Antioquia" />
        </div>
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div>
            <label htmlFor="e-sigla" className={CLS_ETIQUETA}>Sigla (para los códigos)</label>
            <input id="e-sigla" className={CLS_INPUT + ' uppercase'} value={e.sigla} onChange={pon('sigla')} placeholder="ACTIVA" />
          </div>
          <div>
            <label htmlFor="e-nit" className={CLS_ETIQUETA}>NIT (opcional)</label>
            <input id="e-nit" className={CLS_INPUT} value={e.nit} onChange={pon('nit')} placeholder="900.000.000-1" />
          </div>
        </div>
        <div>
          <span className={CLS_ETIQUETA}>Procesos de la entidad</span>
          <div className="flex flex-wrap gap-1.5">
            {(e.procesos || []).map(p => (
              <span key={p} className="inline-flex items-center gap-1 rounded-full bg-tinta-tenue px-2.5 py-1 text-xs font-medium text-tinta dark:bg-slate-700 dark:text-slate-200">
                {p}
                <button aria-label={'Quitar el proceso ' + p} className="rounded-full p-0.5 hover:bg-white/60 dark:hover:bg-slate-600"
                  onClick={() => quitarProceso(p)}><IcoCerrar className="h-3 w-3" /></button>
              </span>
            ))}
            {(e.procesos || []).length === 0 && <span className="text-xs text-slate-400">Aún sin procesos.</span>}
          </div>
          <div className="mt-2 flex gap-2">
            <input aria-label="Nuevo proceso" className={CLS_INPUT + ' flex-1'} value={nuevoProceso}
              placeholder="Ej.: Gestión Contractual" onChange={ev => setNuevoProceso(ev.target.value)}
              onKeyDown={ev => { if (ev.key === 'Enter') agregarProceso(); }} />
            <button className={CLS_BOTON_SECUNDARIO} onClick={agregarProceso}><IcoMas /> Agregar</button>
          </div>
        </div>
        <label className="flex cursor-pointer items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
          <input type="checkbox" checked={e.activo !== false} onChange={ev => setE(prev => ({ ...prev, activo: ev.target.checked }))} />
          Entidad activa (aparece en el selector)
        </label>
      </div>
    </Ventana>
  );
};

/* --- Crear / editar usuario (rol, entidades asignadas y clave) --- */
const ModalUsuario = ({ props, alCerrar, ctx }) => {
  const original = props.usuarioEditar || null;
  const esYo = original && ctx.usuario && original.id === ctx.usuario.id;
  const [u, setU] = useState(() => original
    ? { usuario: original.usuario, nombre: original.nombre, rol: original.rol, activo: original.activo !== false, entidades: original.entidades === 'todas' ? 'todas' : [...(original.entidades || [])] }
    : { usuario: '', nombre: '', rol: 'gestor', activo: true, entidades: [] });
  const [clave, setClave] = useState('');
  const [clave2, setClave2] = useState('');
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);

  const alternarEntidad = (id) => setU(prev => {
    const lista = prev.entidades === 'todas' ? [] : [...prev.entidades];
    return { ...prev, entidades: lista.includes(id) ? lista.filter(x => x !== id) : [...lista, id] };
  });

  const guardar = async () => {
    const login = String(u.usuario || '').trim().toLowerCase();
    if (!login || !u.nombre.trim()) { setError('Completa el usuario y el nombre.'); return; }
    if (!/^[a-z0-9._-]{3,}$/.test(login)) { setError('Usuario inválido: mínimo 3 caracteres, sin espacios.'); return; }
    if (!original && (props.usuarios || []).some(x => x.usuario === login)) { setError('Ya existe el usuario ' + login + '.'); return; }
    if (!original && clave.length < 4) { setError('La clave debe tener al menos 4 caracteres.'); return; }
    if ((clave || clave2) && clave !== clave2) { setError('Las claves no coinciden.'); return; }

    /* No dejar el sistema sin administración activa */
    const adminsActivos = (props.usuarios || []).filter(x => x.rol === 'admin' && x.activo !== false);
    if (original && original.rol === 'admin' && (u.rol !== 'admin' || !u.activo) &&
        adminsActivos.length <= 1 && adminsActivos.some(x => x.id === original.id)) {
      setError('No puedes dejar el sistema sin una cuenta de administración activa.'); return;
    }

    setGuardando(true); setError('');
    try {
      const datos = {
        usuario: login, nombre: u.nombre.trim(), rol: u.rol, activo: !!u.activo,
        entidades: u.entidades === 'todas' ? 'todas' : u.entidades
      };
      if (clave) datos.claveHash = await window.calcularHashClave(login, clave);
      if (original) {
        await DB.actualizarUsuario(original.id, datos);
        ctx.avisar('Usuario ' + login + ' actualizado' + (clave ? ' (clave restablecida)' : ''));
      } else {
        await DB.crearUsuario({ ...datos, creadoEn: new Date().toISOString() });
        ctx.avisar('Usuario ' + login + ' creado');
      }
      if (props.alGuardado) props.alGuardado();
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar el usuario.');
      setGuardando(false);
    }
  };

  return (
    <Ventana titulo={original ? 'Editar usuario' : 'Nuevo usuario'} ancho="max-w-lg" alCerrar={alCerrar}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>{guardando ? 'Guardando…' : 'Guardar usuario'}</button>
      </>}>
      <div className="space-y-4">
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div>
            <label htmlFor="u-login" className={CLS_ETIQUETA}>Usuario de ingreso</label>
            <input id="u-login" className={CLS_INPUT} value={u.usuario} disabled={!!original}
              onChange={ev => setU(prev => ({ ...prev, usuario: ev.target.value }))} />
          </div>
          <div>
            <label htmlFor="u-nombre" className={CLS_ETIQUETA}>Nombre completo</label>
            <input id="u-nombre" className={CLS_INPUT} value={u.nombre}
              onChange={ev => setU(prev => ({ ...prev, nombre: ev.target.value }))} />
          </div>
        </div>

        <div>
          <label htmlFor="u-rol" className={CLS_ETIQUETA}>Rol</label>
          <select id="u-rol" className={CLS_INPUT} value={u.rol} disabled={esYo}
            onChange={ev => setU(prev => ({ ...prev, rol: ev.target.value }))}>
            {ROLES.map(r => <option key={r.valor} value={r.valor}>{r.etiqueta} — {r.ayuda}</option>)}
          </select>
          {esYo && <p className="mt-1 text-[11px] text-slate-400">No puedes cambiar tu propio rol ni desactivarte.</p>}
        </div>

        <div>
          <span className={CLS_ETIQUETA}>Entidades asignadas</span>
          <label className="mb-1.5 flex cursor-pointer items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
            <input type="checkbox" checked={u.entidades === 'todas'}
              onChange={ev => setU(prev => ({ ...prev, entidades: ev.target.checked ? 'todas' : [] }))} />
            Todas las entidades
          </label>
          {u.entidades !== 'todas' && (
            <div className="grid max-h-40 grid-cols-1 gap-1 overflow-y-auto rounded-lg border border-slate-200 p-2 sm:grid-cols-2 dark:border-slate-700">
              {(ctx.catalogoEntidades || []).map(e => (
                <label key={e.id} className="flex cursor-pointer items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
                  <input type="checkbox" checked={u.entidades.includes(e.id)} onChange={() => alternarEntidad(e.id)} />
                  <span className="truncate">{e.sigla || e.nombre}</span>
                </label>
              ))}
              {(ctx.catalogoEntidades || []).length === 0 && <span className="text-xs text-slate-400">No hay entidades creadas.</span>}
            </div>
          )}
        </div>

        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div>
            <label htmlFor="u-clave" className={CLS_ETIQUETA}>{original ? 'Nueva clave (opcional)' : 'Clave'}</label>
            <input id="u-clave" type="password" className={CLS_INPUT} value={clave} onChange={ev => setClave(ev.target.value)}
              placeholder={original ? 'Vacía = no cambia' : ''} autoComplete="new-password" />
          </div>
          <div>
            <label htmlFor="u-clave2" className={CLS_ETIQUETA}>Repetir clave</label>
            <input id="u-clave2" type="password" className={CLS_INPUT} value={clave2} onChange={ev => setClave2(ev.target.value)} autoComplete="new-password" />
          </div>
        </div>

        <label className="flex cursor-pointer items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
          <input type="checkbox" checked={u.activo} disabled={esYo}
            onChange={ev => setU(prev => ({ ...prev, activo: ev.target.checked }))} />
          Usuario activo (puede ingresar)
        </label>
      </div>
    </Ventana>
  );
};

const BotonSubir = () => {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const f = () => setVisible(window.scrollY > 400);
    window.addEventListener('scroll', f, { passive: true });
    return () => window.removeEventListener('scroll', f);
  }, []);
  if (!visible) return null;
  return (
    <button aria-label="Volver arriba"
      onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      className="animar-aparecer fixed bottom-5 left-5 z-40 rounded-full bg-tinta p-3 text-white shadow-lg hover:bg-tinta-claro">
      <IcoFlechaArriba className="h-5 w-5" />
    </button>
  );
};

const PESTANIAS = [
  ['panel', 'Panel'], ['riesgos', 'Riesgos'], ['mapa', 'Mapa'], ['seguimiento', 'Seguimiento'],
  ['autodiag', 'Autodiagnóstico'], ['paac', 'PAAC'], ['planes', 'Planes 612'], ['furag', 'FURAG']
];

const App = () => {
  const [fase, setFase] = useState('cargando');
  const [errorInicio, setErrorInicio] = useState('');
  const [usuario, setUsuario] = useState(null);
  const [catalogoEntidades, setCatalogoEntidades] = useState([]);
  const [entidades, setEntidades] = useState([]);
  const [entidad, setEntidad] = useState(null);
  const [riesgos, setRiesgos] = useState([]);
  const [datosMipg, setDatosMipg] = useState(null); // { autodiagnosticos, paac, planes, furag }
  const [pestania, setPestania] = useState('panel');
  const [modales, setModales] = useState([]);
  const [avisos, setAvisos] = useState([]);
  const [oscuro, setOscuro] = useState(() => localStorage.getItem('mr_tema') === 'oscuro');

  /* Tema claro / oscuro persistente */
  useEffect(() => {
    document.documentElement.classList.toggle('dark', oscuro);
    try { localStorage.setItem('mr_tema', oscuro ? 'oscuro' : 'claro'); } catch (e) {}
  }, [oscuro]);

  /* ESC cierra el modal superior de la pila */
  useEffect(() => {
    const f = (e) => { if (e.key === 'Escape') setModales(ms => ms.slice(0, -1)); };
    window.addEventListener('keydown', f);
    return () => window.removeEventListener('keydown', f);
  }, []);

  /* Arranque: decide entre configurar, primer uso o acceso */
  useEffect(() => {
    (async () => {
      if (!window.FIREBASE_CONFIGURADO) { setFase('configurar'); return; }
      try {
        await DB.iniciar('firestore');
        const hay = await DB.hayUsuarios();
        setFase(hay ? 'acceso' : 'bootstrap');
      } catch (e) {
        console.error(e);
        setErrorInicio(e && e.code ? e.code : 'error de conexión');
        setFase('configurar');
      }
    })();
  }, []);

  const avisar = useCallback((texto, tipo) => {
    const id = Date.now() + Math.random();
    setAvisos(a => [...a, { id, texto, tipo: tipo || 'ok' }]);
    setTimeout(() => setAvisos(a => a.filter(x => x.id !== id)), 4200);
  }, []);
  const abrirModal = useCallback((m) => setModales(ms => [...ms, { ...m, id: Date.now() + Math.random() }]), []);
  const cerrarModal = useCallback((id) => setModales(ms => id ? ms.filter(m => m.id !== id) : ms.slice(0, -1)), []);

  /* Suscripción viva a los riesgos de la entidad elegida */
  useEffect(() => {
    if (fase !== 'listo' || !entidad) return;
    const des = DB.suscribirRiesgos(entidad.id, rs => setRiesgos(rs),
      () => avisar('Se perdió la conexión con los riesgos', 'error'));
    return des;
  }, [fase, entidad ? entidad.id : null]);

  const riesgosCalc = useMemo(() => riesgos.map(r => ({ ...r, calc: calcularResidual(r) })), [riesgos]);

  const registrar = useCallback((accion, riesgoCodigo, detalle) => {
    if (!entidad || !usuario) return;
    DB.registrarHistorial(entidad.id, {
      accion, riesgoCodigo: riesgoCodigo || '', detalle: detalle || '',
      usuario: usuario.usuario, fecha: new Date().toISOString()
    }).catch(e => console.warn('Historial:', e));
  }, [entidad, usuario]);

  const visiblesPara = (todas, u) => todas.filter(e => e.activo !== false &&
    (u.entidades === 'todas' || (Array.isArray(u.entidades) && u.entidades.includes(e.id))));

  const refrescarEntidades = useCallback(async () => {
    const todas = await DB.listarEntidades();
    setCatalogoEntidades(todas);
    if (usuario) setEntidades(visiblesPara(todas, usuario));
    if (entidad) {
      const actual = todas.find(x => x.id === entidad.id);
      if (actual) setEntidad(actual);
    }
  }, [usuario, entidad]);

  /* Datos de los módulos MIPG: se cargan al elegir entidad y se recargan tras cada cambio */
  const recargarMipg = useCallback(async () => {
    if (!entidad) return;
    try {
      const [autodiagnosticos, paac, planes, furag] = await Promise.all([
        DB.listarDe('autodiagnosticos', entidad.id), DB.listarDe('paac', entidad.id),
        DB.listarDe('planes', entidad.id), DB.listarDe('furag', entidad.id)
      ]);
      setDatosMipg({ autodiagnosticos, paac, planes, furag });
    } catch (e) {
      console.error('Módulos MIPG:', e);
      setDatosMipg({ autodiagnosticos: [], paac: [], planes: [], furag: [] });
      avisar('No fue posible cargar los módulos MIPG', 'error');
    }
  }, [entidad ? entidad.id : null]);

  useEffect(() => {
    if (fase !== 'listo' || !entidad) return;
    setDatosMipg(null);
    recargarMipg();
  }, [fase, entidad ? entidad.id : null]);

  const elegirEntidad = (e) => { setRiesgos([]); setEntidad(e); setPestania('panel'); setFase('listo'); };

  const alIngresar = async (u) => {
    setUsuario(u);
    const todas = await DB.listarEntidades();
    setCatalogoEntidades(todas);

const puntajeAutodiag = (doc, politica) => {
  if (!doc || !doc.valores || !Object.keys(doc.valores).length) return null;
  const n = politica.criterios.length;
  let suma = 0;
  for (let i = 0; i < n; i++) suma += (+doc.valores[i] || 0);
  return Math.round(suma / n);
};

  1: 'Gestión del riesgo de corrupción', 2: 'Racionalización de trámites',

  5: 'Transparencia y acceso a la información', 6: 'Iniciativas adicionales'
};
const CORTES_PAAC = [
  { id: 'C1', etiqueta: 'Corte 1 (ene–abr)' },
  { id: 'C2', etiqueta: 'Corte 2 (may–ago)' },
  { id: 'C3', etiqueta: 'Corte 3 (sep–dic)' }
];
const ORDEN_CORTE = { C1: 1, C2: 2, C3: 3 };
const avancePaac = (a) => {
  const cs = a.cortes || [];
  if (!cs.length) return 0;
  const ultimo = [...cs].sort((x, y) => (ORDEN_CORTE[x.corte] || 0) - (ORDEN_CORTE[y.corte] || 0)).pop();
  return Math.max(0, Math.min(100, +ultimo.avance || 0));
};
const actividadVencida = (fechaFin, avance) => !!fechaFin && (+avance || 0) < 100 && fechaFin < hoyISO();

/* Exportador genérico de libros de Excel con plan B en CSV */
const exportarLibro = (nombreArchivo, hojas, avisar) => {
  try {
    if (typeof XLSX === 'undefined') throw new Error('XLSX no disponible');
    const wb = XLSX.utils.book_new();
    hojas.forEach(h => XLSX.utils.book_append_sheet(wb, hojaDesdeMatriz(h.filas, h.anchos, h.zonasEnCols), h.nombre));
    XLSX.writeFile(wb, nombreArchivo + '.xlsx');
    avisar('Excel exportado');
  } catch (e) {
    console.warn('Exportación XLSX falló, se usa CSV:', e);
    const filas = hojas[0].filas;
    const csv = '\ufeff' + filas.map(f => f.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(';')).join('\r\n');
    descargarBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), nombreArchivo + '.csv');
    avisar('Sin librería de Excel: se exportó CSV', 'info');
  }
};

/* Resumen "Estado MIPG" que corona el Panel: cuatro accesos con semáforo */
const EstadoMipg = ({ ctx }) => {
  const d = ctx.datosMipg;
  const anio = new Date().getFullYear();
  let autod = null, nDilig = 0, paacPct = null, nPaac = 0, planesPct = null, nPlanes = 0, furagUlt = null, furagVig = null;
  if (d) {
    const puntajes = POLITICAS
      .map(p => puntajeAutodiag(d.autodiagnosticos.find(x => x.politicaId === p.id), p))
      .filter(x => x != null);
    nDilig = puntajes.length;
    if (puntajes.length) autod = Math.round(puntajes.reduce((a, b) => a + b, 0) / puntajes.length);
    const pa = d.paac.filter(x => +x.anio === anio);
    nPaac = pa.length;
    if (pa.length) paacPct = Math.round(pa.reduce((s, a) => s + avancePaac(a), 0) / pa.length);
    const pl = d.planes.filter(x => +x.anio === anio);
    nPlanes = pl.length;
    if (pl.length) planesPct = Math.round(pl.reduce((s, a) => s + (+a.avance || 0), 0) / pl.length);
    const fs = [...d.furag].sort((a, b) => (+b.vigencia) - (+a.vigencia));
    if (fs.length) { furagUlt = fs[0].indice; furagVig = fs[0].vigencia; }
  }

  const Mini = ({ etiqueta, valor, sub, destino }) => (
    <button onClick={() => ctx.irA(destino)}
      className="rounded-lg border border-slate-200 bg-white p-3 text-left transition-colors hover:border-tinta hover:bg-tinta-tenue dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-slate-800">
      <p className="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">{etiqueta}</p>
      <p className="mt-1 font-display text-2xl font-bold" style={{ color: colorPuntaje(valor).color }}>
        {valor == null ? '—' : valor}
      </p>
      <p className="text-[11px] text-slate-500 dark:text-slate-400">{sub}</p>
    </button>
  );

  return (
    <section className="animar-subir mb-5 rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
      <div className="mb-3 flex items-center justify-between gap-2">
        <TituloSeccion>Estado MIPG</TituloSeccion>
        <span className="text-xs text-slate-400">vigencia {anio}</span>
      </div>
      {d === null ? (
        <p className="text-sm text-slate-400" role="status">Cargando los módulos…</p>
      ) : (
        <div className="grid grid-cols-2 gap-3 lg:grid-cols-4">
          <Mini etiqueta="Autodiagnóstico" valor={autod} destino="autodiag"
            sub={nDilig ? nDilig + '/19 políticas diligenciadas' : 'Sin diligenciar'} />
          <Mini etiqueta="PAAC" valor={paacPct} destino="paac"
            sub={nPaac ? nPaac + ' actividades · % promedio' : 'Sin actividades ' + anio} />
          <Mini etiqueta="Planes Decreto 612" valor={planesPct} destino="planes"
            sub={nPlanes ? nPlanes + ' actividades · % promedio' : 'Sin actividades ' + anio} />
          <Mini etiqueta="FURAG" valor={furagUlt} destino="furag"
            sub={furagVig ? 'Índice de desempeño ' + furagVig : 'Sin resultados registrados'} />
        </div>
      )}
    </section>
  );
};

  const filasPol = POLITICAS.map(p => ({ p, doc: docPara(p.id), puntaje: puntajeAutodiag(docPara(p.id), p) }));
  const diligenciadas = filasPol.filter(x => x.puntaje != null);
  const promedio = diligenciadas.length
    ? Math.round(diligenciadas.reduce((s, x) => s + x.puntaje, 0) / diligenciadas.length) : null;

  const porDimension = Object.keys(DIMENSIONES).map(k => {
    const dim = +k;

    return { dim, nombre: DIMENSIONES[dim],
      puntaje: conDatos.length ? Math.round(conDatos.reduce((s, x) => s + x.puntaje, 0) / conDatos.length) : null };

  const exportar = () => {

      x.doc ? formatearFecha((x.doc.actualizadoEn || '').slice(0, 10)) : '']));
    const filasDetalle = [['Política', 'Criterio', 'Valor', 'Observación']];

    exportarLibro('autodiagnostico_mipg_' + (ctx.entidad.sigla || 'ENT').toLowerCase() + '_' + hoyISO(),
      [{ nombre: 'Resumen', filas: filasResumen, anchos: [34, 44, 10, 18, 16] },
       { nombre: 'Detalle', filas: filasDetalle, anchos: [40, 62, 8, 40] }], ctx.avisar);

    <div className="animar-subir space-y-5">
      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">

          <TituloSeccion>Autodiagnóstico por dimensión</TituloSeccion>
          <div className="flex items-center gap-3">
            <span className="text-xs text-slate-500 dark:text-slate-400">
              Promedio general ({diligenciadas.length}/19)
            </span>
            <ChipPuntaje p={promedio} grande />
            <button className={CLS_BOTON_SECUNDARIO} onClick={exportar}><IcoDescarga /> Exportar</button>
          </div>

        <ul className="space-y-2">
          {porDimension.map(x => (
            <li key={x.dim} className="flex items-center gap-3 text-sm">
              <span className="w-52 shrink-0 truncate text-slate-600 dark:text-slate-300" title={x.nombre}>
                {x.dim}. {x.nombre}

              <span className="h-5 flex-1 overflow-hidden rounded bg-slate-100 dark:bg-slate-800">
                <span className="block h-full rounded"
                  style={{ width: Math.max(2, x.puntaje || 0) + '%', backgroundColor: colorPuntaje(x.puntaje).color }}></span>
              </span>
              <span className="w-10 text-right"><ChipPuntaje p={x.puntaje} /></span>
            </li>
          ))}
        </ul>
        <p className="mt-3 border-t border-slate-100 pt-2 text-xs text-slate-400 dark:border-slate-800">

                  <ChipPuntaje p={x.puntaje} grande />

                      {x.doc

                          formatearFecha((x.doc.actualizadoEn || '').slice(0, 10)) +

};

/* --- Diligenciamiento de una política --- */
const ModalPolitica = ({ props, alCerrar, ctx }) => {
  const pol = politicaPorId(props.politicaId);
  const doc = (ctx.datosMipg && ctx.datosMipg.autodiagnosticos.find(x => x.politicaId === props.politicaId)) || null;
  const [valores, setValores] = useState(() => doc ? clonar(doc.valores || {}) : {});
  const [obs, setObs] = useState(() => doc ? clonar(doc.observaciones || {}) : {});
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);

  const puntaje = puntajeAutodiag({ valores }, pol);
  const ponValor = (i, v) => setValores(prev => {
    const n = { ...prev };
    if (v === '') delete n[i]; else n[i] = +v;
    return n;
  });

  const guardar = async (conCorte) => {
    if (!Object.keys(valores).length) { setError('Califica al menos un criterio.'); return; }
    setGuardando(true); setError('');
    try {
      const ahora = new Date().toISOString();
      const cortes = clonar((doc && doc.cortes) || []);
      if (conCorte) cortes.push({ fecha: hoyISO(), puntaje, usuario: ctx.usuario.usuario });
      const datos = {
        entidadId: ctx.entidad.id, politicaId: pol.id, valores, observaciones: obs,
        cortes, actualizadoEn: ahora, actualizadoPor: ctx.usuario.usuario
      };
      if (doc) await DB.actualizarDe('autodiagnosticos', doc.id, datos);
      else await DB.crearDe('autodiagnosticos', datos);
      ctx.registrar(conCorte ? 'Registró corte de autodiagnóstico' : 'Diligenció autodiagnóstico',
        'MIPG', pol.nombre + ' · puntaje ' + puntaje);
      ctx.avisar(pol.nombre + ': puntaje ' + puntaje + (conCorte ? ' (corte guardado)' : ''));
      await ctx.recargarMipg();
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar el autodiagnóstico.');
      setGuardando(false);
    }
  };

  const cortes = [...((doc && doc.cortes) || [])].sort((a, b) => String(b.fecha).localeCompare(String(a.fecha)));

  return (
    <Ventana titulo={pol.nombre} subtitulo={'Dimensión ' + pol.dim + ' · ' + DIMENSIONES[pol.dim]}
      ancho="max-w-2xl" alCerrar={alCerrar}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>{ctx.puedeEditar ? 'Cancelar' : 'Cerrar'}</button>
        {ctx.puedeEditar && (
          <>
            <button className={CLS_BOTON_SECUNDARIO} onClick={() => guardar(true)} disabled={guardando}>
              <IcoReloj /> Guardar corte
            </button>
            <button className={CLS_BOTON_PRIMARIO} onClick={() => guardar(false)} disabled={guardando}>
              {guardando ? 'Guardando…' : 'Guardar'}
            </button>
          </>
        )}
      </>}>
      <div className="space-y-4">
        <div className="flex items-center justify-between gap-3 rounded-lg bg-slate-50 px-3 py-2 dark:bg-slate-800/60">
          <span className="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Puntaje de la política</span>
          <ChipPuntaje p={puntaje} grande />
        </div>

        <ol className="space-y-3">
          {pol.criterios.map((c, i) => (
            <li key={i} className="rounded-lg border border-slate-200 p-3 dark:border-slate-700">
              <p className="text-sm text-slate-700 dark:text-slate-200">
                <span className="mr-1.5 font-bold text-slate-400">{i + 1}.</span>{c}
              </p>
              <div className="mt-2 flex flex-wrap items-center gap-2">
                <select aria-label={'Calificación del criterio ' + (i + 1)}
                  className={CLS_INPUT + ' w-44'} disabled={!ctx.puedeEditar}
                  value={valores[i] != null ? valores[i] : ''}
                  onChange={e => ponValor(i, e.target.value)}>
                  <option value="">Sin calificar</option>
                  {ESCALA_AUTODIAG.map(x => <option key={x.valor} value={x.valor}>{x.valor} · {x.etiqueta}</option>)}
                </select>
                <input aria-label={'Observación del criterio ' + (i + 1)}
                  className={CLS_INPUT + ' min-w-[160px] flex-1'} disabled={!ctx.puedeEditar}
                  placeholder="Observación (opcional)" value={obs[i] || ''}
                  onChange={e => setObs(prev => ({ ...prev, [i]: e.target.value }))} />
              </div>
            </li>
          ))}
        </ol>

        {cortes.length > 0 && (
          <div>
            <h4 className="mb-1.5 text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Cortes registrados</h4>
            <ul className="space-y-1 text-sm text-slate-600 dark:text-slate-300">
              {cortes.map((c, i) => (
                <li key={i} className="flex items-center gap-2">
                  <ChipPuntaje p={c.puntaje} />
                  <span>{formatearFecha(c.fecha)}</span>
                  <span className="text-xs text-slate-400">· {c.usuario}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
    </Ventana>
  );
};

/* ===== 3.15 Pestaña PAAC (Plan Anticorrupción y de Atención al Ciudadano) ===== */

const PaacTab = ({ ctx }) => {
  const d = ctx.datosMipg;
  const [anio, setAnio] = useState(new Date().getFullYear());
  if (d === null) {
    return <p className="rounded-xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-400 dark:border-slate-700 dark:bg-slate-900" role="status">Cargando el PAAC…</p>;
  }
  const anios = [...new Set([new Date().getFullYear(), ...d.paac.map(x => +x.anio)])].sort((a, b) => b - a);
  const items = d.paac.filter(x => +x.anio === +anio)
    .map(x => ({ ...x, avance: avancePaac(x), vencida: actividadVencida(x.fechaFin, avancePaac(x)) }));
  const promedio = items.length ? Math.round(items.reduce((s, x) => s + x.avance, 0) / items.length) : null;
  const vencidas = items.filter(x => x.vencida).length;

  const riesgosCorrupcion = ctx.riesgosCalc.filter(r => r.tipo === 'Corrupción' && r.estado !== 'Cerrado');

  const eliminar = (x) => ctx.abrirModal({
    tipo: 'confirmar',
    props: {
      titulo: 'Eliminar actividad del PAAC',
      mensaje: 'Se eliminará la actividad "' + x.actividad + '" con sus cortes de seguimiento.',
      textoConfirmar: 'Eliminar',
      alConfirmar: async () => {
        try {
          await DB.eliminarDe('paac', x.id);
          ctx.registrar('Eliminó actividad PAAC', 'PAAC', String(x.actividad).slice(0, 90));
          ctx.avisar('Actividad eliminada');
          await ctx.recargarMipg();
        } catch (e) { console.error(e); ctx.avisar('No fue posible eliminar', 'error'); }
      }
    }
  });

  const exportar = () => {
    const filas = [['Componente', 'Subcomponente', 'Actividad', 'Meta o producto', 'Responsable',
      'Fecha fin', 'Avance %', 'C1', 'C2', 'C3', 'Última observación']];
    items.forEach(x => {
      const porCorte = (c) => { const s = (x.cortes || []).filter(y => y.corte === c).pop(); return s ? s.avance : ''; };
      const ult = (x.cortes || [])[x.cortes ? x.cortes.length - 1 : 0];
      filas.push([x.componente + '. ' + PAAC_COMPONENTES[x.componente], x.subcomponente || '', x.actividad,
        x.meta || '', x.responsable || '', formatearFecha(x.fechaFin), x.avance,
        porCorte('C1'), porCorte('C2'), porCorte('C3'), ult ? ult.observacion : '']);
    });
    exportarLibro('paac_' + anio + '_' + (ctx.entidad.sigla || 'ENT').toLowerCase(),
      [{ nombre: 'PAAC ' + anio, filas, anchos: [30, 26, 46, 24, 20, 11, 9, 6, 6, 6, 40] }], ctx.avisar);
  };

  const claseIcono = 'rounded p-1.5 text-slate-500 transition-colors hover:bg-slate-100 hover:text-tinta dark:text-slate-400 dark:hover:bg-slate-800';

  return (
    <div className="animar-subir space-y-5">
      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
        <div className="flex flex-wrap items-center justify-between gap-2">
          <div className="flex flex-wrap items-center gap-3">
            <TituloSeccion>PAAC {anio}</TituloSeccion>
            <select aria-label="Vigencia del PAAC" className={CLS_INPUT + ' w-auto'} value={anio}
              onChange={e => setAnio(+e.target.value)}>
              {anios.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <div className="flex flex-wrap gap-2">
            <button className={CLS_BOTON_SECUNDARIO} onClick={exportar}><IcoDescarga /> Exportar</button>
            {ctx.puedeEditar && (
              <button className={CLS_BOTON_PRIMARIO}
                onClick={() => ctx.abrirModal({ tipo: 'paac-actividad', props: { anio } })}>
                <IcoMas /> Nueva actividad
              </button>
            )}
          </div>
        </div>
        <div className="mt-3 flex flex-wrap items-center gap-x-6 gap-y-2 border-t border-slate-100 pt-3 text-sm dark:border-slate-800">
          <span className="text-slate-600 dark:text-slate-300">{items.length} actividades</span>
          <span className="flex items-center gap-2 text-slate-600 dark:text-slate-300">Avance promedio <ChipPuntaje p={promedio} /></span>
          <span className={vencidas ? 'font-semibold text-red-700 dark:text-red-400' : 'text-slate-600 dark:text-slate-300'}>
            {vencidas} vencida(s)
          </span>
          <span className="ml-auto flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
            Componente 1: {riesgosCorrupcion.length} riesgo(s) de corrupción en la matriz
            <button className="font-semibold text-tinta underline-offset-2 hover:underline dark:text-tinta-claro"
              onClick={() => ctx.irA('riesgos')}>Ver riesgos</button>
          </span>
        </div>
      </section>

      {items.length === 0 ? (
        <div className="rounded-xl border border-dashed border-slate-300 bg-white p-10 text-center text-sm text-slate-500 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-400" role="status">
          Sin actividades registradas para {anio}.
          {ctx.puedeEditar && ' Usa "Nueva actividad" para armar el plan por componentes.'}
        </div>
      ) : (
        [1, 2, 3, 4, 5, 6].map(comp => {
          const delComp = items.filter(x => +x.componente === comp);
          if (!delComp.length) return null;
          const prom = Math.round(delComp.reduce((s, x) => s + x.avance, 0) / delComp.length);
          return (
            <section key={comp} className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
              <div className="mb-2 flex items-center justify-between gap-2">
                <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200">
                  Componente {comp} · {PAAC_COMPONENTES[comp]}
                </h3>
                <ChipPuntaje p={prom} />
              </div>
              <div className="overflow-x-auto">
                <table className="w-full min-w-[860px] text-sm">
                  <thead className="text-left text-[11px] uppercase tracking-wide text-slate-400">
                    <tr>
                      <th className="py-2 pr-3">Subcomponente</th><th className="py-2 pr-3">Actividad</th>
                      <th className="py-2 pr-3">Responsable</th><th className="py-2 pr-3">Fecha fin</th>
                      <th className="py-2 pr-3">Avance</th><th className="py-2 pr-3">Cortes</th>
                      <th className="py-2 text-right">Acciones</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                    {delComp.map(x => (
                      <tr key={x.id} className="align-top">
                        <td className="max-w-[180px] py-2 pr-3 text-xs text-slate-500">{x.subcomponente || '—'}</td>
                        <td className="min-w-[240px] py-2 pr-3">
                          <p className="text-slate-700 dark:text-slate-200">{x.actividad}</p>
                          {x.meta && <p className="text-[11px] text-slate-400">Meta: {x.meta}</p>}
                        </td>
                        <td className="py-2 pr-3 text-xs text-slate-500">{x.responsable || '—'}</td>
                        <td className={'whitespace-nowrap py-2 pr-3 text-xs ' + (x.vencida ? 'font-semibold text-red-700 dark:text-red-400' : 'text-slate-500')}>
                          {formatearFecha(x.fechaFin)}{x.vencida && <span className="ml-1.5"><Etiqueta texto="Vencida" /></span>}
                        </td>
                        <td className="py-2 pr-3"><ChipPuntaje p={x.avance} /></td>
                        <td className="py-2 pr-3 text-xs text-slate-500">

                        <td className="py-2">
                          <div className="flex justify-end gap-0.5">
                            {ctx.puedeEditar && (
                              <>
                                <button className={claseIcono} aria-label="Registrar corte de seguimiento"
                                  onClick={() => ctx.abrirModal({ tipo: 'paac-corte', props: { actividadId: x.id } })}><IcoReloj /></button>
                                <button className={claseIcono} aria-label="Editar actividad"
                                  onClick={() => ctx.abrirModal({ tipo: 'paac-actividad', props: { actividadId: x.id, anio } })}><IcoLapiz /></button>
                              </>
                            )}
                            {ctx.esAdmin && (
                              <button className={claseIcono + ' hover:text-red-700'} aria-label="Eliminar actividad"
                                onClick={() => eliminar(x)}><IcoBasura /></button>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>
          );
        })
      )}
    </div>
  );
};

/* --- Crear / editar actividad del PAAC --- */
const ModalActividadPaac = ({ props, alCerrar, ctx }) => {
  const original = props.actividadId
    ? (ctx.datosMipg ? ctx.datosMipg.paac.find(x => x.id === props.actividadId) : null) : null;
  const [b, setB] = useState(() => original ? clonar(original) : {
    anio: props.anio || new Date().getFullYear(), componente: 1, subcomponente: '',
    actividad: '', meta: '', responsable: '', fechaFin: ''
  });
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);
  const pon = (k) => (e) => setB(prev => ({ ...prev, [k]: e.target.value }));

  const guardar = async () => {
    if (!String(b.actividad || '').trim()) { setError('Describe la actividad.'); return; }
    setGuardando(true); setError('');
    try {
      const datos = {
        entidadId: ctx.entidad.id, anio: +b.anio, componente: +b.componente,
        subcomponente: (b.subcomponente || '').trim(), actividad: String(b.actividad).trim(),
        meta: (b.meta || '').trim(), responsable: (b.responsable || '').trim(), fechaFin: b.fechaFin || ''
      };
      if (original) {
        await DB.actualizarDe('paac', original.id, datos);
        ctx.registrar('Actualizó actividad PAAC', 'PAAC', datos.actividad.slice(0, 90));
        ctx.avisar('Actividad actualizada');
      } else {
        await DB.crearDe('paac', { ...datos, cortes: [], creadoEn: new Date().toISOString() });
        ctx.registrar('Creó actividad PAAC', 'PAAC', datos.actividad.slice(0, 90));
        ctx.avisar('Actividad creada');
      }
      await ctx.recargarMipg();
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar la actividad.');
      setGuardando(false);
    }
  };

  return (
    <Ventana titulo={original ? 'Editar actividad del PAAC' : 'Nueva actividad del PAAC'}
      subtitulo={'Vigencia ' + b.anio} ancho="max-w-lg" alCerrar={alCerrar}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>{guardando ? 'Guardando…' : 'Guardar actividad'}</button>
      </>}>
      <div className="space-y-4">
        <div>
          <label htmlFor="pa-comp" className={CLS_ETIQUETA}>Componente</label>
          <select id="pa-comp" className={CLS_INPUT} value={b.componente} onChange={pon('componente')}>
            {Object.keys(PAAC_COMPONENTES).map(k => <option key={k} value={k}>{k}. {PAAC_COMPONENTES[k]}</option>)}
          </select>
        </div>
        <div>
          <label htmlFor="pa-sub" className={CLS_ETIQUETA}>Subcomponente</label>
          <input id="pa-sub" className={CLS_INPUT} value={b.subcomponente} onChange={pon('subcomponente')}
            placeholder="Ej.: Estrategia de racionalización" />
        </div>
        <div>

/* --- Registro del corte cuatrimestral de una actividad del PAAC --- */
const ModalCortePaac = ({ props, alCerrar, ctx }) => {
  const item = ctx.datosMipg ? ctx.datosMipg.paac.find(x => x.id === props.actividadId) : null;
  const yaRegistrados = (item && item.cortes ? item.cortes.map(c => c.corte) : []);
  const siguiente = CORTES_PAAC.find(c => !yaRegistrados.includes(c.id));
  const [corte, setCorte] = useState(siguiente ? siguiente.id : 'C3');
  const [avance, setAvance] = useState(item ? avancePaac(item) : 0);
  const [observacion, setObservacion] = useState('');
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);

  if (!item) {
    return (
      <Ventana titulo="Actividad no disponible" ancho="max-w-md" alCerrar={alCerrar}
        pie={<button className={CLS_BOTON_PRIMARIO} onClick={alCerrar}>Cerrar</button>}>
        <p className="text-sm text-slate-600 dark:text-slate-300">La actividad ya no existe.</p>
      </Ventana>
    );
  }

  const guardar = async () => {
    const pct = Math.max(0, Math.min(100, +avance || 0));
    if (!String(observacion || '').trim()) { setError('Escribe la observación del corte.'); return; }
    setGuardando(true); setError('');
    try {
      const nuevo = { corte, avance: pct, observacion: String(observacion).trim(),
        fecha: hoyISO(), usuario: ctx.usuario.usuario };
      const cortes = clonar(item.cortes || []).filter(c => c.corte !== corte); // re-registrar reemplaza
      cortes.push(nuevo);
      cortes.sort((a, b) => (ORDEN_CORTE[a.corte] || 0) - (ORDEN_CORTE[b.corte] || 0));
      await DB.actualizarDe('paac', item.id, { cortes });
      ctx.registrar('Registró corte PAAC', 'PAAC', corte + ' · ' + pct + '% · ' + String(item.actividad).slice(0, 60));
      ctx.avisar('Corte ' + corte + ' registrado (' + pct + '%)');
      await ctx.recargarMipg();
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar el corte.');
      setGuardando(false);
    }
  };

  return (
    <Ventana titulo="Registrar corte de seguimiento" subtitulo={String(item.actividad).slice(0, 80)}
      ancho="max-w-md" alCerrar={alCerrar}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>{guardando ? 'Guardando…' : 'Guardar corte'}</button>
      </>}>
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label htmlFor="pc-corte" className={CLS_ETIQUETA}>Corte</label>
            <select id="pc-corte" className={CLS_INPUT} value={corte} onChange={e => setCorte(e.target.value)}>
              {CORTES_PAAC.map(c => (
                <option key={c.id} value={c.id}>{c.etiqueta}{yaRegistrados.includes(c.id) ? ' · registrado' : ''}</option>
              ))}
            </select>
          </div>
          <div>
            <label htmlFor="pc-avance" className={CLS_ETIQUETA}>Avance (%)</label>
            <input id="pc-avance" type="number" min="0" max="100" step="5" className={CLS_INPUT}
              value={avance} onChange={e => setAvance(e.target.value)} />
          </div>
        </div>
        <div>
          <label htmlFor="pc-obs" className={CLS_ETIQUETA}>Observación</label>
          <textarea id="pc-obs" rows="3" className={CLS_INPUT} value={observacion} autoFocus
            onChange={e => setObservacion(e.target.value)}
            placeholder="Qué se ejecutó, evidencias y pendientes…" />
        </div>
        {yaRegistrados.includes(corte) && (
          <p className="text-xs text-amber-700 dark:text-amber-400">Este corte ya tiene registro: al guardar se reemplaza.</p>
        )}
      </div>
    </Ventana>
  );
};

/* ===== 3.16 Pestaña Planes del Decreto 612 ===== */

const PlanesTab = ({ ctx }) => {
  const d = ctx.datosMipg;
  const [anio, setAnio] = useState(new Date().getFullYear());
  if (d === null) {
    return <p className="rounded-xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-400 dark:border-slate-700 dark:bg-slate-900" role="status">Cargando los planes…</p>;
  }
  const anios = [...new Set([new Date().getFullYear(), ...d.planes.map(x => +x.anio), ...d.paac.map(x => +x.anio)])].sort((a, b) => b - a);
  const items = d.planes.filter(x => +x.anio === +anio);
  const paacAnio = d.paac.filter(x => +x.anio === +anio);

  const resumenPlan = (plan) => {
    if (plan.desdePaac) {
      const n = paacAnio.length;
      const prom = n ? Math.round(paacAnio.reduce((s, a) => s + avancePaac(a), 0) / n) : null;
      const venc = paacAnio.filter(a => actividadVencida(a.fechaFin, avancePaac(a))).length;
      return { n, prom, venc };
    }
    const acts = items.filter(x => +x.planId === plan.id);
    const n = acts.length;
    const prom = n ? Math.round(acts.reduce((s, a) => s + (+a.avance || 0), 0) / n) : null;
    const venc = acts.filter(a => actividadVencida(a.fechaFin, +a.avance || 0)).length;
    return { n, prom, venc };
  };

  const totalActs = items.length + paacAnio.length;
  const conAvance = [...items.map(a => +a.avance || 0), ...paacAnio.map(avancePaac)];
  const promGlobal = conAvance.length ? Math.round(conAvance.reduce((a, b) => a + b, 0) / conAvance.length) : null;
  const vencGlobal = items.filter(a => actividadVencida(a.fechaFin, +a.avance || 0)).length +
    paacAnio.filter(a => actividadVencida(a.fechaFin, avancePaac(a))).length;

  const exportar = () => {
    const filasResumen = [['N°', 'Plan', 'Actividades', 'Avance %', 'Vencidas']];
    PLANES_612.forEach(p => {
      const r = resumenPlan(p);
      filasResumen.push([p.id, p.nombre + (p.desdePaac ? ' (desde PAAC)' : ''), r.n, r.prom == null ? '' : r.prom, r.venc]);
    });
    const filasActs = [['Plan', 'Actividad', 'Responsable', 'Fecha fin', 'Avance %', 'Evidencia']];
    items.forEach(a => filasActs.push([
      (PLANES_612.find(p => p.id === +a.planId) || {}).nombre || a.planId,
      a.actividad, a.responsable || '', formatearFecha(a.fechaFin), +a.avance || 0, a.evidencia || '']));
    exportarLibro('planes_612_' + anio + '_' + (ctx.entidad.sigla || 'ENT').toLowerCase(),
      [{ nombre: 'Resumen', filas: filasResumen, anchos: [5, 52, 11, 9, 9] },
       { nombre: 'Actividades', filas: filasActs, anchos: [40, 46, 20, 11, 9, 24] }], ctx.avisar);
  };

  return (
    <div className="animar-subir space-y-5">
      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
        <div className="flex flex-wrap items-center justify-between gap-2">
          <div className="flex flex-wrap items-center gap-3">
            <TituloSeccion>Planes institucionales · Decreto 612</TituloSeccion>
            <select aria-label="Vigencia de los planes" className={CLS_INPUT + ' w-auto'} value={anio}
              onChange={e => setAnio(+e.target.value)}>
              {anios.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <button className={CLS_BOTON_SECUNDARIO} onClick={exportar}><IcoDescarga /> Exportar</button>
        </div>
        <div className="mt-3 flex flex-wrap items-center gap-x-6 gap-y-2 border-t border-slate-100 pt-3 text-sm dark:border-slate-800">
          <span className="text-slate-600 dark:text-slate-300">{totalActs} actividades en {anio}</span>
          <span className="flex items-center gap-2 text-slate-600 dark:text-slate-300">Avance promedio <ChipPuntaje p={promGlobal} /></span>
          <span className={vencGlobal ? 'font-semibold text-red-700 dark:text-red-400' : 'text-slate-600 dark:text-slate-300'}>
            {vencGlobal} vencida(s)
          </span>
        </div>
      </section>

      <div className="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
        {PLANES_612.map(p => {
          const r = resumenPlan(p);
          return (
            <button key={p.id}
              onClick={() => p.desdePaac ? ctx.irA('paac') : ctx.abrirModal({ tipo: 'plan612', props: { planId: p.id, anio } })}
              className="flex items-start gap-3 rounded-xl border border-slate-200 bg-white p-3 text-left transition-colors hover:border-tinta hover:bg-tinta-tenue dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-slate-800">
              <span className="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-tinta font-display text-sm font-bold text-white">{p.id}</span>
              <span className="min-w-0 flex-1">
                <span className="linea-2 block text-sm font-semibold text-slate-800 dark:text-slate-100">{p.nombre}</span>
                <span className="mt-1 flex flex-wrap items-center gap-2 text-[11px] text-slate-500 dark:text-slate-400">
                  <ChipPuntaje p={r.prom} />
                  <span>{r.n} actividad(es)</span>
                  {r.venc > 0 && <span className="font-semibold text-red-700 dark:text-red-400">{r.venc} vencida(s)</span>}
                  {p.desdePaac && <span className="rounded bg-tinta-tenue px-1.5 py-0.5 font-semibold text-tinta dark:bg-slate-700 dark:text-slate-200">desde PAAC</span>}
                </span>
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
};

      const datos = {
        entidadId: ctx.entidad.id, anio: +props.anio, planId: plan.id,

        await DB.actualizarDe('planes', edit.id, datos);
