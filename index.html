<!-- ============================================================================
     MATRIZ DE RIESGOS MIPG "VIVA" — aplicación genérica multi-entidad
     ----------------------------------------------------------------------------
     Un solo archivo HTML. React 18 (UMD) + Babel standalone + Tailwind CDN +
     Firebase compat (Firestore, sesión anónima) + xlsx-js-style para Excel.
     Metodología: Guía para la administración del riesgo del DAFP (MIPG):
       · Probabilidad e impacto en 5 niveles (20% a 100%).
       · Controles con atributos de eficiencia (tipo + implementación) que
         reducen probabilidad (preventivo/detectivo) o impacto (correctivo)
         de forma secuencial para obtener el riesgo residual.
       · Mapa de calor 5×5 con zonas Bajo / Moderado / Alto / Extremo.
       · Riesgos de corrupción: impacto mínimo Moderado y sin opción "Aceptar".

     INSTALACIÓN (3 pasos)
     1) En la consola de Firebase crea un proyecto, activa Firestore y la
        autenticación ANÓNIMA. Copia el objeto firebaseConfig.
     2) Pega esa configuración en la sección "1. CONFIGURACIÓN" más abajo
        (reemplaza los valores TU_...).
     3) Publica en Firestore las reglas sugeridas de este comentario.
     Sin configuración, la app ofrece un MODO DEMOSTRACIÓN en memoria
     (datos de ejemplo, nada se guarda) para explorar la interfaz.

     COLECCIONES EN FIRESTORE
       usuarios/{id}                → login propio de la app (clave con hash)
       entidades/{id}               → entidades públicas y sus procesos
       entidades/{id}/historial/{h} → bitácora automática de cambios
       riesgos/{id}                 → riesgos (campo entidadId), con arrays
                                      de controles, plan de acción y seguimientos
       autodiagnosticos/{id}        → autodiagnóstico MIPG por política (entidadId)
       paac/{id}                    → actividades del PAAC con cortes cuatrimestrales
       planes/{id}                  → actividades de los 12 planes del Decreto 612
       furag/{id}                   → resultados FURAG por vigencia y política

     REGLAS DE FIRESTORE SUGERIDAS (pegar en la pestaña Reglas)
     ------------------------------------------------------------------
     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         // La app abre sesión anónima de Firebase y encima aplica su propio
         // login (colección usuarios) y control por roles. Estas reglas exigen
         // como mínimo una sesión firmada.
         function sesionFirmada() { return request.auth != null; }

         match /usuarios/{id}    { allow read, write: if sesionFirmada(); }
         match /entidades/{id}   {
           allow read, write: if sesionFirmada();
           match /historial/{h}  { allow read, create: if sesionFirmada(); }
         }
         match /riesgos/{id}     { allow read, write: if sesionFirmada(); }
         match /autodiagnosticos/{id} { allow read, write: if sesionFirmada(); }
         match /paac/{id}        { allow read, write: if sesionFirmada(); }
         match /planes/{id}      { allow read, write: if sesionFirmada(); }
         match /furag/{id}       { allow read, write: if sesionFirmada(); }
         match /{documento=**}   { allow read, write: if false; }
       }
     }
     ------------------------------------------------------------------
     ADVERTENCIA: con sesión anónima, cualquiera que tenga la URL del sitio
     puede leer/escribir estas colecciones. Para producción con datos
     sensibles considera Firebase Auth con correo o App Check.
     ============================================================================ -->

<!-- ========================================================================
     1. CONFIGURACIÓN DE FIREBASE
     Estructura del bloque:
       1.1 Claves del proyecto (reemplazar TU_...)
       1.2 Inicialización, long-polling y persistencia offline
       1.3 Sesión anónima (window.authReady)
     La seguridad real vive en las reglas de Firestore, no en ocultar claves.
     ======================================================================== -->
<script>
'use strict';

/* ===== 1.1 Claves del proyecto ===== */
const FIREBASE_CONFIG = {
  apiKey: 'TU_API_KEY',
  authDomain: 'TU_PROYECTO.firebaseapp.com',
  projectId: 'TU_PROYECTO',
  storageBucket: 'TU_PROYECTO.appspot.com',
  messagingSenderId: 'TU_SENDER_ID',
  appId: 'TU_APP_ID'
};

/* La app detecta si aún no se pegó la configuración real */
window.FIREBASE_CONFIGURADO = !/^TU_/.test(FIREBASE_CONFIG.apiKey || 'TU_');
window.db = null;
window.authReady = Promise.resolve(null);

if (window.FIREBASE_CONFIGURADO) {
  try {
    /* ===== 1.2 Inicialización y robustez de red ===== */
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    /* Redes institucionales con proxy: detectar long-polling automáticamente */
    db.settings({ experimentalAutoDetectLongPolling: true, merge: true });
    /* Persistencia offline: la matriz sigue consultable sin internet */
    db.enablePersistence({ synchronizeTabs: true }).catch(function (err) {
      console.warn('Persistencia offline no disponible:', err && err.code);
    });
    window.db = db;

    /* ===== 1.3 Sesión anónima ===== */
    window.authReady = firebase.auth().signInAnonymously()
      .then(function (cred) { return cred.user; })
      .catch(function (err) {
        console.error('No fue posible abrir la sesión anónima:', err);
        throw err;
      });
  } catch (err) {
    console.error('Error inicializando Firebase:', err);
    window.FIREBASE_CONFIGURADO = false;
  }
}
</script>

<!-- ========================================================================
     2. CAPA DE DATOS (window.DB)
     Estructura del bloque:
       2.1 Utilidades comunes (hash de clave, clonado, ids)
       2.2 Backend Firestore
       2.3 Backend en memoria (modo demostración)
       2.4 Datos de demostración
       2.5 API pública window.DB
     La interfaz NUNCA habla con Firestore directamente: siempre pasa por DB.
     ======================================================================== -->
<script>
'use strict';

/* ===== 2.1 Utilidades comunes ===== */

/* Hash de clave: SHA-256 de "usuario:clave" (usuario en minúsculas actúa de sal).
   Plan B si el navegador no expone crypto.subtle: hash djb2 (más débil). */
window.calcularHashClave = async function (usuario, clave) {
  const texto = String(usuario || '').trim().toLowerCase() + ':' + String(clave || '');
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  } catch (e) {
    let h = 5381;
    for (let i = 0; i < texto.length; i++) h = ((h << 5) + h + texto.charCodeAt(i)) >>> 0;
    return 'djb2_' + h.toString(16);
  }
};

const clonar = (o) => JSON.parse(JSON.stringify(o));
let contadorMem = 0;
const idMem = (prefijo) => prefijo + '_' + Date.now().toString(36) + '_' + (++contadorMem);

/* ===== 2.2 Backend Firestore ===== */
const BackendFirestore = {
  async listo() { await window.authReady; return window.db; },

  async hayUsuarios() {
    const db = await this.listo();
    const res = await db.collection('usuarios').limit(1).get();
    return !res.empty;
  },
  async buscarUsuarioPorLogin(usuario) {
    const db = await this.listo();
    const res = await db.collection('usuarios')
      .where('usuario', '==', String(usuario || '').trim().toLowerCase()).limit(1).get();
    return res.empty ? null : { id: res.docs[0].id, ...res.docs[0].data() };
  },
  async listarUsuarios() {
    const db = await this.listo();
    const res = await db.collection('usuarios').get();
    return res.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async crearUsuario(datos) {
    const db = await this.listo();
    const ref = await db.collection('usuarios').add(datos);
    return ref.id;
  },
  async actualizarUsuario(id, parciales) {
    const db = await this.listo();
    await db.collection('usuarios').doc(id).update(parciales);
  },

  async listarEntidades() {
    const db = await this.listo();
    const res = await db.collection('entidades').get();
    return res.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async crearEntidad(datos) {
    const db = await this.listo();
    const ref = await db.collection('entidades').add(datos);
    return ref.id;
  },
  async actualizarEntidad(id, parciales) {
    const db = await this.listo();
    await db.collection('entidades').doc(id).update(parciales);
  },

  suscribirRiesgos(entidadId, alCambiar, alFallar) {
    /* onSnapshot mantiene la matriz "viva": cualquier cambio llega en segundos.
       El orden se resuelve en el cliente para no exigir índices compuestos. */
    return window.db.collection('riesgos')
      .where('entidadId', '==', entidadId)
      .onSnapshot(
        res => alCambiar(res.docs.map(d => ({ id: d.id, ...d.data() }))),
        err => { console.error('Suscripción de riesgos:', err); if (alFallar) alFallar(err); }
      );
  },
  async crearRiesgo(datos) {
    const db = await this.listo();
    const ref = await db.collection('riesgos').add(datos);
    return ref.id;
  },
  async actualizarRiesgo(id, parciales) {
    const db = await this.listo();
    await db.collection('riesgos').doc(id).update(parciales);
  },
  async eliminarRiesgo(id) {
    const db = await this.listo();
    await db.collection('riesgos').doc(id).delete();
  },
  async agregarSeguimiento(riesgoId, seguimiento) {
    const db = await this.listo();
    /* arrayUnion evita pisar seguimientos si dos personas registran a la vez */
    await db.collection('riesgos').doc(riesgoId).update({
      seguimientos: firebase.firestore.FieldValue.arrayUnion(seguimiento),
      actualizadoEn: new Date().toISOString()
    });
  },

  async registrarHistorial(entidadId, evento) {
    const db = await this.listo();
    await db.collection('entidades').doc(entidadId).collection('historial').add(evento);
  },
  async listarHistorial(entidadId, limite) {
    const db = await this.listo();
    const res = await db.collection('entidades').doc(entidadId)
      .collection('historial').orderBy('fecha', 'desc').limit(limite || 300).get();
    return res.docs.map(d => ({ id: d.id, ...d.data() }));
  },

  /* Operaciones genéricas de los módulos MIPG. Se consulta solo por entidadId
     (una igualdad: no requiere índices compuestos) y se filtra en el cliente. */
  async listarDe(coleccion, entidadId) {
    const db = await this.listo();
    const res = await db.collection(coleccion).where('entidadId', '==', entidadId).get();
    return res.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async crearDe(coleccion, datos) {
    const db = await this.listo();
    const ref = await db.collection(coleccion).add(datos);
    return ref.id;
  },
  async actualizarDe(coleccion, id, parciales) {
    const db = await this.listo();
    await db.collection(coleccion).doc(id).update(parciales);
  },
  async eliminarDe(coleccion, id) {
    const db = await this.listo();
    await db.collection(coleccion).doc(id).delete();
  }
};

/* ===== 2.3 Backend en memoria (modo demostración) ===== */
const MEM = { usuarios: [], entidades: [], riesgos: [], historial: {}, oyentes: [],
  tablas: { autodiagnosticos: [], paac: [], planes: [], furag: [] } };

const emitirRiesgos = (entidadId) => {
  MEM.oyentes
    .filter(o => o.entidadId === entidadId)
    .forEach(o => o.alCambiar(clonar(MEM.riesgos.filter(r => r.entidadId === entidadId))));
};

const BackendMemoria = {
  async hayUsuarios() { return MEM.usuarios.length > 0; },
  async buscarUsuarioPorLogin(usuario) {
    const u = MEM.usuarios.find(x => x.usuario === String(usuario || '').trim().toLowerCase());
    return u ? clonar(u) : null;
  },
  async listarUsuarios() { return clonar(MEM.usuarios); },
  async crearUsuario(datos) { const id = idMem('usr'); MEM.usuarios.push({ id, ...clonar(datos) }); return id; },
  async actualizarUsuario(id, p) {
    const u = MEM.usuarios.find(x => x.id === id); if (u) Object.assign(u, clonar(p));
  },

  async listarEntidades() { return clonar(MEM.entidades); },
  async crearEntidad(datos) { const id = idMem('ent'); MEM.entidades.push({ id, ...clonar(datos) }); return id; },
  async actualizarEntidad(id, p) {
    const e = MEM.entidades.find(x => x.id === id); if (e) Object.assign(e, clonar(p));
  },

  suscribirRiesgos(entidadId, alCambiar) {
    const oyente = { entidadId, alCambiar };
    MEM.oyentes.push(oyente);
    setTimeout(() => emitirRiesgos(entidadId), 0);
    return () => { MEM.oyentes = MEM.oyentes.filter(o => o !== oyente); };
  },
  async crearRiesgo(datos) {
    const id = idMem('rsg'); MEM.riesgos.push({ id, ...clonar(datos) });
    emitirRiesgos(datos.entidadId); return id;
  },
  async actualizarRiesgo(id, p) {
    const r = MEM.riesgos.find(x => x.id === id);
    if (r) { Object.assign(r, clonar(p)); emitirRiesgos(r.entidadId); }
  },
  async eliminarRiesgo(id) {
    const r = MEM.riesgos.find(x => x.id === id);
    MEM.riesgos = MEM.riesgos.filter(x => x.id !== id);
    if (r) emitirRiesgos(r.entidadId);
  },
  async agregarSeguimiento(riesgoId, seg) {
    const r = MEM.riesgos.find(x => x.id === riesgoId);
    if (r) {
      r.seguimientos = r.seguimientos || [];
      r.seguimientos.push(clonar(seg));
      r.actualizadoEn = new Date().toISOString();
      emitirRiesgos(r.entidadId);
    }
  },

  async registrarHistorial(entidadId, ev) {
    MEM.historial[entidadId] = MEM.historial[entidadId] || [];
    MEM.historial[entidadId].unshift({ id: idMem('his'), ...clonar(ev) });
  },
  async listarHistorial(entidadId, limite) {
    return clonar((MEM.historial[entidadId] || []).slice(0, limite || 300));
  },

  /* Operaciones genéricas de los módulos MIPG (colecciones simples por entidad) */
  async listarDe(coleccion, entidadId) {
    return clonar((MEM.tablas[coleccion] || []).filter(x => x.entidadId === entidadId));
  },
  async crearDe(coleccion, datos) {
    const id = idMem(coleccion.slice(0, 3));
    (MEM.tablas[coleccion] = MEM.tablas[coleccion] || []).push({ id, ...clonar(datos) });
    return id;
  },
  async actualizarDe(coleccion, id, parciales) {
    const x = (MEM.tablas[coleccion] || []).find(y => y.id === id);
    if (x) Object.assign(x, clonar(parciales));
  },
  async eliminarDe(coleccion, id) {
    MEM.tablas[coleccion] = (MEM.tablas[coleccion] || []).filter(y => y.id !== id);
  }
};

<script type="text/babel" data-presets="react">
'use strict';
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ===== 3.1 Constantes de la metodología DAFP ===== */

const NIVELES_PROBABILIDAD_DEFAULT = [
  { nivel: 1, etiqueta: 'Muy baja', pct: 20,  criterio: 'La actividad se ejecuta como máximo 2 veces al año' },
  { nivel: 2, etiqueta: 'Baja',     pct: 40,  criterio: 'Entre 3 y 24 veces al año' },
  { nivel: 3, etiqueta: 'Media',    pct: 60,  criterio: 'Entre 24 y 500 veces al año' },
  { nivel: 4, etiqueta: 'Alta',     pct: 80,  criterio: 'Mínimo 500 veces al año' },
  { nivel: 5, etiqueta: 'Muy alta', pct: 100, criterio: 'Más de 5000 veces al año' }
];

const NIVELES_IMPACTO_DEFAULT = [
  { nivel: 1, etiqueta: 'Leve',         pct: 20,  criterio: 'Afectación menor al 0,5% del presupuesto; sin efecto reputacional relevante' },
  { nivel: 2, etiqueta: 'Menor',        pct: 40,  criterio: 'Entre el 0,5% y el 1% del presupuesto; reclamaciones puntuales' },
  { nivel: 3, etiqueta: 'Moderado',     pct: 60,  criterio: 'Entre el 1% y el 5% del presupuesto; quejas de usuarios o medios locales' },
  { nivel: 4, etiqueta: 'Mayor',        pct: 80,  criterio: 'Entre el 5% y el 20% del presupuesto; sanciones o medios regionales' },
  { nivel: 5, etiqueta: 'Catastrófico', pct: 100, criterio: 'Más del 20% del presupuesto; intervención o medios nacionales' }
];

/* Mapa de calor DAFP: MATRIZ_ZONAS[probabilidad][impacto-1] */
const MATRIZ_ZONAS_DEFAULT = {
  5: ['Alto', 'Alto', 'Extremo', 'Extremo', 'Extremo'],
  4: ['Moderado', 'Alto', 'Alto', 'Extremo', 'Extremo'],
  3: ['Moderado', 'Moderado', 'Alto', 'Extremo', 'Extremo'],
  2: ['Bajo', 'Moderado', 'Moderado', 'Alto', 'Extremo'],
  1: ['Bajo', 'Bajo', 'Moderado', 'Alto', 'Extremo']
};

const ZONAS = {
  Bajo:     { orden: 1, color: '#2E7D32', textoOscuro: false },
  Moderado: { orden: 2, color: '#F9A825', textoOscuro: true  },
  Alto:     { orden: 3, color: '#EF6C00', textoOscuro: false },
  Extremo:  { orden: 4, color: '#C62828', textoOscuro: false }
};
const NOMBRES_ZONAS = ['Bajo', 'Moderado', 'Alto', 'Extremo'];

const zonaDe = (p, i) => (MATRIZ_ZONAS_DEFAULT[p] || MATRIZ_ZONAS_DEFAULT[1])[(i || 1) - 1];

/* Atributos de eficiencia del control (Guía DAFP): el porcentaje del tipo más
   el de la implementación definen cuánto reduce el control. Los preventivos y
   detectivos reducen la PROBABILIDAD; los correctivos, el IMPACTO. */
const TIPOS_CONTROL = {
  Preventivo: { pct: 25, afecta: 'probabilidad' },
  Detectivo:  { pct: 15, afecta: 'probabilidad' },
  Correctivo: { pct: 10, afecta: 'impacto' }
};
const IMPLEMENTACION_CONTROL = { 'Automático': 25, 'Manual': 15 };
const valoracionControl = (c) =>
  ((TIPOS_CONTROL[c.tipo] || {}).pct || 0) + (IMPLEMENTACION_CONTROL[c.implementacion] || 0);

const TIPOS_RIESGO = ['Gestión', 'Corrupción', 'Seguridad de la información'];
const TRATAMIENTOS = ['Aceptar', 'Reducir (mitigar)', 'Evitar', 'Compartir o transferir'];
/* Para riesgos de corrupción la guía DAFP no admite "Aceptar" */
const tratamientosPara = (tipo) => tipo === 'Corrupción' ? TRATAMIENTOS.slice(1) : TRATAMIENTOS;

const ESTADOS_RIESGO = ['Activo', 'Materializado', 'Cerrado'];
const ESTADOS_ACCION = ['Pendiente', 'En curso', 'Cumplida'];
const EFICACIAS = ['Eficaz', 'Con observaciones', 'Ineficaz'];
const ROLES = [
  { valor: 'admin',    etiqueta: 'Administración', ayuda: 'Todo: entidades, usuarios y riesgos' },
  { valor: 'gestor',   etiqueta: 'Gestión',        ayuda: 'Crea y edita riesgos y seguimientos' },
  { valor: 'consulta', etiqueta: 'Consulta',       ayuda: 'Solo lectura y exportación' }
];

/* ===== 3.2 Utilidades ===== */

const hoyISO = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
};
/* Fechas AAAA-MM-DD → DD/MM/AAAA sin pasar por Date (evita desfase de zona) */
const formatearFecha = (iso) => {
  if (!iso) return '—';
  const [a, m, d] = String(iso).slice(0, 10).split('-');
  return (d && m && a) ? `${d}/${m}/${a}` : String(iso);
};
const formatearFechaHora = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return String(iso);
  return formatearFecha(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'))
    + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
};
const periodoActual = () => {
  const d = new Date();
  return 'T' + (Math.floor(d.getMonth() / 3) + 1) + '-' + d.getFullYear();
};
const enLineas = (texto) => String(texto || '').split('\n').map(l => l.trim()).filter(Boolean);
const accionVencida = (a) => !!a.fecha && a.estado !== 'Cumplida' && a.fecha < hoyISO();

const nivelDesdePct = (pct) => pct <= 20 ? 1 : pct <= 40 ? 2 : pct <= 60 ? 3 : pct <= 80 ? 4 : 5;
const redondear1 = (n) => Math.round(n * 10) / 10;

/* Cálculo del riesgo residual según DAFP: los controles se aplican en cadena
   sobre el porcentaje inherente y el resultado se lleva de nuevo a nivel 1–5. */
const calcularResidual = (r) => {
  const pInh = (NIVELES_PROBABILIDAD_DEFAULT[(r.probabilidad || 1) - 1] || {}).pct || 20;
  const iInh = (NIVELES_IMPACTO_DEFAULT[(r.impacto || 1) - 1] || {}).pct || 20;
  let pPct = pInh, iPct = iInh;
  (r.controles || []).forEach(c => {
    const v = valoracionControl(c) / 100;
    if ((TIPOS_CONTROL[c.tipo] || {}).afecta === 'impacto') iPct = iPct * (1 - v);
    else pPct = pPct * (1 - v);
  });
  let pRes = nivelDesdePct(pPct);
  let iRes = nivelDesdePct(iPct);
  let impactoAjustado = false;
  /* Regla DAFP para corrupción: el impacto nunca baja de Moderado (3) */
  if (r.tipo === 'Corrupción' && iRes < 3) { iRes = 3; impactoAjustado = true; }
  if (r.tipo === 'Corrupción' && (r.impacto || 1) < 3) impactoAjustado = true;
  return {
    pInh, iInh,
    pPct: redondear1(pPct), iPct: redondear1(iPct),
    pRes, iRes, impactoAjustado,
    zonaInherente: zonaDe(r.probabilidad || 1, Math.max(r.impacto || 1, r.tipo === 'Corrupción' ? 3 : 1)),
    zonaResidual: zonaDe(pRes, iRes)
  };
};

/* Resumen legible de qué cambió al editar (para la bitácora) */
const resumirCambios = (antes, ahora) => {
  const campos = [
    ['codigo', 'código'], ['proceso', 'proceso'], ['tipo', 'tipo'],
    ['nombre', 'descripción'], ['causas', 'causas'], ['consecuencias', 'consecuencias'],
    ['probabilidad', 'probabilidad'], ['impacto', 'impacto'],
    ['tratamiento', 'tratamiento'], ['responsable', 'responsable'], ['estado', 'estado']
  ];
  const cambios = campos.filter(([k]) => String(antes[k] ?? '') !== String(ahora[k] ?? '')).map(([, n]) => n);
  if (JSON.stringify(antes.controles || []) !== JSON.stringify(ahora.controles || [])) cambios.push('controles');
  if (JSON.stringify(antes.plan || []) !== JSON.stringify(ahora.plan || [])) cambios.push('plan de acción');
  return cambios.length ? 'Cambió: ' + cambios.join(', ') : 'Sin cambios de fondo';
};

const siguienteCodigo = (riesgos, sigla) => {
  const prefijo = 'R-' + (sigla || 'ENT').toUpperCase() + '-';
  let mayor = 0;
  riesgos.forEach(r => {
    const m = String(r.codigo || '').match(new RegExp('^' + prefijo + '(\\d+)$'));
    if (m) mayor = Math.max(mayor, parseInt(m[1], 10));
  });
  return prefijo + String(mayor + 1).padStart(3, '0');
};

const ordenarRiesgos = (lista) => [...lista].sort((a, b) => {
  const za = (ZONAS[a.calc.zonaResidual] || {}).orden || 0;
  const zb = (ZONAS[b.calc.zonaResidual] || {}).orden || 0;
  if (za !== zb) return zb - za; // primero lo crítico
  return String(a.codigo).localeCompare(String(b.codigo));
});

const descargarBlob = (blob, nombre) => {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombre; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 400);
};

const quitarTildes = (t) => String(t || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');

/* Estilos compartidos para xlsx-js-style */
const estiloCabecera = {
  font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
  fill: { fgColor: { rgb: '16324F' } },
  alignment: { vertical: 'center', horizontal: 'center', wrapText: true },
  border: { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } }
};
const estiloCelda = {
  alignment: { vertical: 'top', wrapText: true },
  border: { top: { style: 'thin', color: { rgb: 'CBD5E1' } }, bottom: { style: 'thin', color: { rgb: 'CBD5E1' } }, left: { style: 'thin', color: { rgb: 'CBD5E1' } }, right: { style: 'thin', color: { rgb: 'CBD5E1' } } }
};
const estiloZona = (zona) => ({
  ...estiloCelda,
  font: { bold: true, color: { rgb: (ZONAS[zona] || {}).textoOscuro ? '1E293B' : 'FFFFFF' } },
  fill: { fgColor: { rgb: ((ZONAS[zona] || {}).color || '#888888').replace('#', '') } },
  alignment: { vertical: 'center', horizontal: 'center' }
});

const hojaDesdeMatriz = (filas, anchos, zonasEnCols) => {
  const ws = XLSX.utils.aoa_to_sheet(filas.map(f => f.map(v => String(v ?? ''))));
  const rango = XLSX.utils.decode_range(ws['!ref']);
  for (let f = rango.s.r; f <= rango.e.r; f++) {
    for (let c = rango.s.c; c <= rango.e.c; c++) {
      const ref = XLSX.utils.encode_cell({ r: f, c });
      if (!ws[ref]) continue;
      if (f === 0) ws[ref].s = estiloCabecera;
      else if (zonasEnCols && zonasEnCols.includes(c) && ZONAS[ws[ref].v]) ws[ref].s = estiloZona(ws[ref].v);
      else ws[ref].s = estiloCelda;
    }
  }
  ws['!cols'] = anchos.map(w => ({ wch: w }));
  ws['!rows'] = [{ hpt: 26 }];
  return ws;
};

const filasMapaRiesgos = (riesgosCalc) => {
  const cab = ['Código', 'Proceso', 'Tipo', 'Descripción del riesgo', 'Causas', 'Consecuencias',
    'Probabilidad inherente', 'Impacto inherente', 'Zona inherente', 'N° de controles',
    'Controles (resumen)', 'Probabilidad residual', 'Impacto residual', 'Zona residual',
    'Tratamiento', 'Acciones del plan', 'Acciones cumplidas', 'Responsable', 'Estado', 'Última actualización'];
  const filas = riesgosCalc.map(r => {
    const ctr = (r.controles || []).map(c => `${c.descripcion} [${c.tipo} · ${c.implementacion} · ${valoracionControl(c)}%]`).join('\n');
    const plan = (r.plan || []).map(a => `${a.descripcion} (${a.responsable || 's/r'} · ${formatearFecha(a.fecha)} · ${a.estado})`).join('\n');
    const pI = NIVELES_PROBABILIDAD_DEFAULT[r.probabilidad - 1], iI = NIVELES_IMPACTO_DEFAULT[r.impacto - 1];
    const pR = NIVELES_PROBABILIDAD_DEFAULT[r.calc.pRes - 1], iR = NIVELES_IMPACTO_DEFAULT[r.calc.iRes - 1];
    return [r.codigo, r.proceso, r.tipo, r.nombre, r.causas || '', r.consecuencias || '',
      `${r.probabilidad} · ${pI ? pI.etiqueta : ''}`, `${r.impacto} · ${iI ? iI.etiqueta : ''}`, r.calc.zonaInherente,
      (r.controles || []).length, ctr,
      `${r.calc.pRes} · ${pR ? pR.etiqueta : ''}`, `${r.calc.iRes} · ${iR ? iR.etiqueta : ''}`, r.calc.zonaResidual,
      r.tratamiento || '', (r.plan || []).length, (r.plan || []).filter(a => a.estado === 'Cumplida').length,
      r.responsable || '', r.estado, formatearFecha((r.actualizadoEn || '').slice(0, 10))];
  });
  return [cab, ...filas];
};

const exportarExcel = (entidad, riesgosCalc, avisar) => {
  const nombre = `mapa_riesgos_${(entidad.sigla || 'ENT').toLowerCase()}_${hoyISO()}`;
  const lista = ordenarRiesgos(riesgosCalc);
  try {
    if (typeof XLSX === 'undefined') throw new Error('XLSX no disponible');
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, hojaDesdeMatriz(filasMapaRiesgos(lista),
      [12, 18, 16, 46, 34, 34, 14, 14, 12, 8, 50, 14, 14, 12, 20, 44, 10, 20, 12, 14], [8, 13]), 'Mapa de Riesgos');

    const filasCtr = [['Código del riesgo', 'Control', 'Tipo', 'Implementación', 'Valoración %', 'Responsable', 'Documentación', 'Frecuencia', 'Evidencia']];
    lista.forEach(r => (r.controles || []).forEach(c => filasCtr.push([
      r.codigo, c.descripcion, c.tipo, c.implementacion, valoracionControl(c),
      c.responsable || '', c.documentacion || '', c.frecuencia || '', c.evidencia || ''])));
    XLSX.utils.book_append_sheet(wb, hojaDesdeMatriz(filasCtr, [12, 52, 12, 14, 11, 22, 14, 12, 12]), 'Controles');

    const filasSeg = [['Código del riesgo', 'Fecha', 'Periodo', 'Eficacia', 'Observación', 'Evidencia', 'Registró']];
    lista.forEach(r => (r.seguimientos || []).forEach(s => filasSeg.push([
      r.codigo, formatearFecha(s.fecha), s.periodo || '', s.eficacia || '', s.observacion || '', s.evidencia || '', s.usuario || ''])));
    XLSX.utils.book_append_sheet(wb, hojaDesdeMatriz(filasSeg, [12, 11, 9, 16, 56, 28, 12]), 'Seguimientos');

    XLSX.writeFile(wb, nombre + '.xlsx');
    avisar('Excel exportado: ' + lista.length + ' riesgos');
  } catch (e) {
    /* Plan B: CSV con BOM y punto y coma (Excel es-CO) */
    console.warn('Exportación XLSX falló, se usa CSV:', e);
    const filas = filasMapaRiesgos(lista);
    const csv = '\ufeff' + filas.map(f => f.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(';')).join('\r\n');
    descargarBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), nombre + '.csv');
    avisar('No cargó la librería de Excel: se exportó CSV', 'info');
  }
};

/* Lee la primera hoja del archivo y devuelve { listos, omitidos } */
const leerImportacion = async (archivo, entidad, codigosExistentes) => {
  if (typeof XLSX === 'undefined') throw new Error('La librería de Excel no cargó; verifica la conexión.');
  const wb = XLSX.read(await archivo.arrayBuffer(), { type: 'array' });
  const hoja = wb.Sheets[wb.SheetNames[0]];
  const filas = XLSX.utils.sheet_to_json(hoja, { defval: '' });
  const clave = (t) => quitarTildes(t).toLowerCase().replace(/[^a-z0-9]/g, '');
  const buscar = (fila, ...nombres) => {
    const mapa = {};
    Object.keys(fila).forEach(k => { mapa[clave(k)] = fila[k]; });
    for (const n of nombres) { const v = mapa[clave(n)]; if (v !== undefined && v !== '') return v; }
    return '';
  };
  const listos = [], omitidos = [];
  const vistos = new Set(codigosExistentes.map(c => String(c).toUpperCase()));
  filas.forEach((fila, idx) => {
    const nFila = idx + 2;
    const codigo = String(buscar(fila, 'Código', 'Codigo')).trim().toUpperCase();
    const nombre = String(buscar(fila, 'Descripción del riesgo', 'Descripcion del riesgo', 'Riesgo', 'Nombre')).trim();
    if (!codigo && !nombre) return; // fila vacía
    if (!codigo) { omitidos.push({ fila: nFila, motivo: 'Sin código' }); return; }
    if (!nombre) { omitidos.push({ fila: nFila, motivo: 'Sin descripción del riesgo' }); return; }
    if (vistos.has(codigo)) { omitidos.push({ fila: nFila, motivo: 'Código repetido: ' + codigo }); return; }
    let tipo = String(buscar(fila, 'Tipo')).trim();
    tipo = TIPOS_RIESGO.find(t => quitarTildes(t).toLowerCase() === quitarTildes(tipo).toLowerCase()) || 'Gestión';
    const num = (v, min, max) => Math.min(max, Math.max(min, parseInt(v, 10) || min));
    let probabilidad = num(buscar(fila, 'Probabilidad (1-5)', 'Probabilidad'), 1, 5);
    let impacto = num(buscar(fila, 'Impacto (1-5)', 'Impacto'), 1, 5);
    if (tipo === 'Corrupción' && impacto < 3) impacto = 3;
    let tratamiento = String(buscar(fila, 'Tratamiento')).trim();
    tratamiento = tratamientosPara(tipo).find(t => quitarTildes(t).toLowerCase().startsWith(quitarTildes(tratamiento).toLowerCase().slice(0, 6)) && tratamiento) || 'Reducir (mitigar)';
    vistos.add(codigo);
    listos.push({
      codigo, nombre, tipo, probabilidad, impacto, tratamiento,
      proceso: String(buscar(fila, 'Proceso')).trim() || ((entidad.procesos || [])[0] || 'General'),
      causas: String(buscar(fila, 'Causas (una por línea)', 'Causas')).trim(),
      consecuencias: String(buscar(fila, 'Consecuencias (una por línea)', 'Consecuencias')).trim(),
      responsable: String(buscar(fila, 'Responsable')).trim(),
      estado: 'Activo', controles: [], plan: [], seguimientos: []
    });
  });
  return { listos, omitidos };
};

const PantallaAcceso = ({ alIngresar, modoDemo }) => {
  const [usuario, setUsuario] = useState(modoDemo ? 'admin' : '');
  const [clave, setClave] = useState(modoDemo ? 'admin' : '');
  const [error, setError] = useState('');
  const [cargando, setCargando] = useState(false);

  const intentar = async () => {
    if (cargando) return;
    if (!usuario.trim() || !clave) { setError('Escribe el usuario y la clave.'); return; }
    setCargando(true); setError('');
    try {
      const u = await DB.buscarUsuarioPorLogin(usuario);
      const hash = await window.calcularHashClave(usuario, clave);
      if (!u || u.claveHash !== hash) { setError('Usuario o clave incorrectos.'); return; }
      if (u.activo === false) { setError('El usuario está inactivo. Contacta a la administración.'); return; }
      await alIngresar(u);
    } catch (e) {
      console.error(e);
      setError('No fue posible validar el ingreso. Revisa la conexión e intenta de nuevo.');
    } finally { setCargando(false); }
  };
  const conEnter = (e) => { if (e.key === 'Enter') intentar(); };

  return (
    <MarcoAcceso>
      <h2 className="font-display text-lg font-semibold text-slate-800 dark:text-slate-100">Ingresar</h2>
      {modoDemo && (
        <p className="mt-2 rounded-lg bg-amber-50 px-3 py-2 text-xs text-amber-800 dark:bg-amber-950 dark:text-amber-200">
          Modo demostración · usuario <strong>admin</strong>, clave <strong>admin</strong>
        </p>
      )}
      <div className="mt-4 space-y-4">
        <div>
          <label htmlFor="campo-usuario" className={CLS_ETIQUETA}>Usuario</label>
          <input id="campo-usuario" className={CLS_INPUT} value={usuario} autoFocus={!modoDemo}
            autoComplete="username" onChange={e => setUsuario(e.target.value)} onKeyDown={conEnter} />
        </div>
        <div>
          <label htmlFor="campo-clave" className={CLS_ETIQUETA}>Clave</label>
          <input id="campo-clave" type="password" className={CLS_INPUT} value={clave}
            autoComplete="current-password" onChange={e => setClave(e.target.value)} onKeyDown={conEnter} />
        </div>
        {error && <p className="text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_PRIMARIO + ' w-full justify-center'} onClick={intentar} disabled={cargando}>
          {cargando ? 'Validando…' : 'Ingresar'}
        </button>
      </div>
    </MarcoAcceso>
  );
};

/* Primer uso con Firebase vacío: crear la cuenta de administración */
const PantallaBootstrap = ({ alCrear }) => {
  const [d, setD] = useState({ nombre: '', usuario: '', clave: '', clave2: '' });
  const [error, setError] = useState('');
  const [cargando, setCargando] = useState(false);
  const campo = (k) => (e) => setD({ ...d, [k]: e.target.value });

  const crear = async () => {
    if (cargando) return;
    const usuario = d.usuario.trim().toLowerCase();
    if (!d.nombre.trim() || !usuario || !d.clave) { setError('Completa todos los campos.'); return; }
    if (!/^[a-z0-9._-]{3,}$/.test(usuario)) { setError('El usuario debe tener mínimo 3 caracteres, sin espacios (letras, números, punto, guion).'); return; }
    if (d.clave.length < 4) { setError('La clave debe tener al menos 4 caracteres.'); return; }
    if (d.clave !== d.clave2) { setError('Las claves no coinciden.'); return; }
    setCargando(true); setError('');
    try {
      const claveHash = await window.calcularHashClave(usuario, d.clave);
      const datos = { usuario, nombre: d.nombre.trim(), rol: 'admin', entidades: 'todas', activo: true, claveHash, creadoEn: new Date().toISOString() };
      const id = await DB.crearUsuario(datos);
      await alCrear({ id, ...datos });
    } catch (e) {
      console.error(e);
      setError('No fue posible crear la cuenta. Revisa las reglas de Firestore.');
      setCargando(false);
    }
  };
  const conEnter = (e) => { if (e.key === 'Enter') crear(); };

  return (
    <MarcoAcceso>
      <h2 className="font-display text-lg font-semibold text-slate-800 dark:text-slate-100">Primer uso</h2>
      <p className="mt-1 text-sm text-slate-600 dark:text-slate-300">La base de datos está vacía. Crea la cuenta de administración inicial.</p>
      <div className="mt-4 space-y-4">
        <div>
          <label htmlFor="bs-nombre" className={CLS_ETIQUETA}>Nombre completo</label>
          <input id="bs-nombre" className={CLS_INPUT} value={d.nombre} autoFocus onChange={campo('nombre')} onKeyDown={conEnter} />
        </div>
        <div>
          <label htmlFor="bs-usuario" className={CLS_ETIQUETA}>Usuario de ingreso</label>
          <input id="bs-usuario" className={CLS_INPUT} value={d.usuario} onChange={campo('usuario')} onKeyDown={conEnter} />
        </div>
        <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label htmlFor="bs-clave" className={CLS_ETIQUETA}>Clave</label>
            <input id="bs-clave" type="password" className={CLS_INPUT} value={d.clave} onChange={campo('clave')} onKeyDown={conEnter} />
          </div>
          <div>
            <label htmlFor="bs-clave2" className={CLS_ETIQUETA}>Repetir clave</label>
            <input id="bs-clave2" type="password" className={CLS_INPUT} value={d.clave2} onChange={campo('clave2')} onKeyDown={conEnter} />
          </div>
        </div>
        {error && <p className="text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_PRIMARIO + ' w-full justify-center'} onClick={crear} disabled={cargando}>
          {cargando ? 'Creando…' : 'Crear cuenta y continuar'}
        </button>
      </div>
    </MarcoAcceso>
  );
};

/* ===== 3.7 Pestaña Panel ===== */

const fechaMasDias = (n) => {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
};

const TarjetaKpi = ({ etiqueta, valor, detalle, alerta }) => (
  <div className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
    <p className="text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">{etiqueta}</p>
    <p className={'mt-1 font-display text-3xl font-bold ' + (alerta ? 'text-red-700 dark:text-red-400' : 'text-tinta dark:text-slate-100')}>{valor}</p>
    {detalle && <p className="mt-0.5 text-xs text-slate-500 dark:text-slate-400">{detalle}</p>}
  </div>
);

const Dona = ({ conteos, total }) => {
  const R = 40, C = 2 * Math.PI * R;
  let acumulado = 0;
  const segmentos = NOMBRES_ZONAS.map(z => {
    const n = conteos[z] || 0;
    const frac = total ? n / total : 0;
    const s = { zona: z, n, frac, offset: acumulado };
    acumulado += frac;
    return s;
  });
  return (
    <div className="flex flex-wrap items-center justify-center gap-6">
      <div className="relative h-36 w-36">
        <svg viewBox="0 0 100 100" className="h-36 w-36 -rotate-90">
          <circle cx="50" cy="50" r={R} fill="none" stroke="#E2E8F0" strokeWidth="14" />
          {segmentos.filter(s => s.n > 0).map(s => (
            <circle key={s.zona} cx="50" cy="50" r={R} fill="none" stroke={ZONAS[s.zona].color}
              strokeWidth="14" strokeDasharray={(s.frac * C) + ' ' + C} strokeDashoffset={-s.offset * C} />
          ))}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <span className="font-display text-2xl font-bold text-tinta dark:text-slate-100">{total}</span>
          <span className="text-[10px] uppercase tracking-wide text-slate-500 dark:text-slate-400">riesgos</span>
        </div>
      </div>
      <ul className="space-y-1.5 text-sm">
        {segmentos.map(s => (
          <li key={s.zona} className="flex items-center gap-2">
            <span className="h-3 w-3 rounded-sm" style={{ backgroundColor: ZONAS[s.zona].color }} aria-hidden="true"></span>
            <span className="w-20 text-slate-600 dark:text-slate-300">{s.zona}</span>
            <span className="font-semibold text-slate-800 dark:text-slate-100">{s.n}</span>
          </li>
        ))}
      </ul>
    </div>
  );
};

const BarrasProceso = ({ riesgosCalc }) => {
  const conteo = {};
  riesgosCalc.forEach(r => { const p = r.proceso || 'Sin proceso'; conteo[p] = (conteo[p] || 0) + 1; });
  const filas = Object.entries(conteo).sort((a, b) => b[1] - a[1]);
  const max = filas.length ? filas[0][1] : 1;
  if (!filas.length) return <p className="text-sm text-slate-500 dark:text-slate-400">Sin datos aún.</p>;
  return (
    <ul className="space-y-2">
      {filas.map(([proceso, n]) => (
        <li key={proceso} className="flex items-center gap-3 text-sm">
          <span className="w-40 shrink-0 truncate text-slate-600 dark:text-slate-300" title={proceso}>{proceso}</span>
          <span className="h-5 flex-1 overflow-hidden rounded bg-slate-100 dark:bg-slate-800">
            <span className="block h-full rounded bg-tinta dark:bg-tinta-claro" style={{ width: Math.max(4, (n / max) * 100) + '%' }}></span>
          </span>
          <span className="w-6 text-right font-semibold text-slate-800 dark:text-slate-100">{n}</span>
        </li>
      ))}
    </ul>
  );
};

const Panel = ({ riesgosCalc, abrirModal, puedeEditar }) => {
  const noCerrados = riesgosCalc.filter(r => r.estado !== 'Cerrado');
  const criticos = ordenarRiesgos(noCerrados.filter(r => ['Alto', 'Extremo'].includes(r.calc.zonaResidual)));
  const materializados = riesgosCalc.filter(r => r.estado === 'Materializado').length;

  const acciones = [];
  noCerrados.forEach(r => (r.plan || []).forEach(a => acciones.push({ r, a })));
  const vencidas = acciones.filter(x => accionVencida(x.a));
  const limite30 = fechaMasDias(30);
  const proximas = acciones
    .filter(x => x.a.estado !== 'Cumplida' && x.a.fecha && x.a.fecha <= limite30)
    .sort((x, y) => String(x.a.fecha).localeCompare(String(y.a.fecha)))
    .slice(0, 8);

  const periodo = periodoActual();
  const segsPeriodo = riesgosCalc.reduce((n, r) => n + (r.seguimientos || []).filter(s => s.periodo === periodo).length, 0);

  const conteosZona = {};
  noCerrados.forEach(r => { conteosZona[r.calc.zonaResidual] = (conteosZona[r.calc.zonaResidual] || 0) + 1; });

  if (!riesgosCalc.length) {
    return (
      <div className="animar-subir rounded-xl border border-dashed border-slate-300 bg-white p-10 text-center dark:border-slate-600 dark:bg-slate-900" role="status">
        <LogoMatriz className="mx-auto h-12 w-12 opacity-80" />
        <h3 className="mt-3 font-display text-lg font-semibold text-slate-800 dark:text-slate-100">La matriz está vacía</h3>
        <p className="mx-auto mt-1 max-w-md text-sm text-slate-500 dark:text-slate-400">
          Registra el primer riesgo o importa el mapa de riesgos existente desde un archivo de Excel en la pestaña Riesgos.
        </p>
        {puedeEditar && (
          <button className={CLS_BOTON_PRIMARIO + ' mt-4'} onClick={() => abrirModal({ tipo: 'riesgo', props: {} })}>
            <IcoMas /> Registrar el primer riesgo
          </button>
        )}
      </div>
    );
  }

  return (
    <div className="animar-subir space-y-5">
      <div className="grid grid-cols-2 gap-3 lg:grid-cols-4">
        <TarjetaKpi etiqueta="Riesgos activos" valor={noCerrados.length}
          detalle={materializados ? materializados + ' materializado(s)' : 'Sin materializaciones'} alerta={materializados > 0} />
        <TarjetaKpi etiqueta="En zona alta o extrema" valor={criticos.length} detalle="Riesgo residual" alerta={criticos.length > 0} />
        <TarjetaKpi etiqueta="Acciones vencidas" valor={vencidas.length} detalle="Del plan de acción" alerta={vencidas.length > 0} />
        <TarjetaKpi etiqueta={'Seguimientos ' + periodo} valor={segsPeriodo} detalle="Registrados en el periodo" />
      </div>

      <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
        <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
          <div className="mb-3 flex items-center justify-between gap-2">
            <TituloSeccion>Mapa de calor residual</TituloSeccion>
            <span className="text-xs text-slate-400">Toca una celda para ver sus riesgos</span>
          </div>
          <MapaCalor riesgosCalc={noCerrados} vista="residual" tam="sm"
            alClicCelda={(p, i) => abrirModal({ tipo: 'celda', props: { p, i, vista: 'residual' } })} />
        </section>

        <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
          <div className="mb-3"><TituloSeccion>Distribución por zona residual</TituloSeccion></div>
          <Dona conteos={conteosZona} total={noCerrados.length} />
        </section>
      </div>

      <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
        <div className="mb-3"><TituloSeccion>Riesgos por proceso</TituloSeccion></div>
        <BarrasProceso riesgosCalc={noCerrados} />
      </section>

      <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
        <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
          <div className="mb-3"><TituloSeccion>Prioridad: zona alta y extrema</TituloSeccion></div>
          {criticos.length ? (
            <ul className="divide-y divide-slate-100 dark:divide-slate-800">
              {criticos.slice(0, 6).map(r => (
                <li key={r.id}>
                  <button className="flex w-full items-center gap-3 py-2 text-left hover:bg-slate-50 dark:hover:bg-slate-800"
                    onClick={() => abrirModal({ tipo: 'ver', props: { riesgoId: r.id } })}>
                    <span className="w-24 shrink-0 text-xs font-semibold text-slate-500 dark:text-slate-400">{r.codigo}</span>
                    <span className="linea-2 flex-1 text-sm text-slate-700 dark:text-slate-200">{r.nombre}</span>
                    <ChipZona zona={r.calc.zonaResidual} />
                  </button>
                </li>
              ))}
            </ul>
          ) : <p className="text-sm text-slate-500 dark:text-slate-400">Ningún riesgo en zona alta o extrema. Buen trabajo.</p>}
        </section>

        <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
          <div className="mb-3"><TituloSeccion>Acciones por vencer (30 días)</TituloSeccion></div>
          {proximas.length ? (
            <ul className="divide-y divide-slate-100 dark:divide-slate-800">
              {proximas.map((x, i) => (
                <li key={x.r.id + '-' + i} className="flex items-center gap-3 py-2">
                  <span className={'w-20 shrink-0 text-xs font-semibold ' + (accionVencida(x.a) ? 'text-red-700 dark:text-red-400' : 'text-slate-500 dark:text-slate-400')}>
                    {formatearFecha(x.a.fecha)}
                  </span>
                  <span className="min-w-0 flex-1">
                    <span className="linea-2 block text-sm text-slate-700 dark:text-slate-200">{x.a.descripcion}</span>
                    <span className="text-[11px] text-slate-400">{x.r.codigo}{x.a.responsable ? ' · ' + x.a.responsable : ''}</span>
                  </span>
                  {accionVencida(x.a) ? <Etiqueta texto="Vencida" /> : <Etiqueta texto={x.a.estado} />}
                </li>
              ))}
            </ul>
          ) : <p className="text-sm text-slate-500 dark:text-slate-400">Sin acciones próximas a vencer.</p>}
        </section>
      </div>
    </div>
  );
};

/* ===== 3.8 Pestaña Mapa de calor ===== */

const posicionRiesgo = (r, vista) => vista === 'inherente'
  ? { p: r.probabilidad || 1, i: r.tipo === 'Corrupción' ? Math.max(r.impacto || 1, 3) : (r.impacto || 1) }
  : { p: r.calc.pRes, i: r.calc.iRes };

/* Firma visual de la app: la matriz 5×5 DAFP con conteos vivos y celdas
   accionables. Se usa grande en su pestaña y pequeña en el panel. */
const MapaCalor = ({ riesgosCalc, vista, tam, alClicCelda }) => {
  const grande = tam !== 'sm';
  const conteos = {};
  riesgosCalc.forEach(r => {
    const { p, i } = posicionRiesgo(r, vista);
    conteos[p + '-' + i] = (conteos[p + '-' + i] || 0) + 1;
  });
  const altoCelda = grande ? 'h-12 sm:h-16' : 'h-9';
  const anchoEje = grande ? 'w-16 sm:w-20' : 'w-8';

  return (
    <div className={grande ? 'text-xs' : 'text-[10px]'}>
      <div className="flex">
        <div className="flex select-none items-center pr-1 text-[10px] font-bold uppercase tracking-widest text-slate-400"
          style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>
          Probabilidad
        </div>
        <div className="min-w-0 flex-1">
          {[5, 4, 3, 2, 1].map(p => (
            <div key={p} className="mb-1 flex gap-1">
              <div className={anchoEje + ' flex shrink-0 flex-col items-end justify-center pr-1 leading-tight'}>
                <span className="font-bold text-slate-600 dark:text-slate-300">{p}</span>
                {grande && <span className="hidden text-slate-400 sm:block">{NIVELES_PROBABILIDAD_DEFAULT[p - 1].etiqueta}</span>}
              </div>
              {[1, 2, 3, 4, 5].map(i => {
                const zona = zonaDe(p, i);
                const z = ZONAS[zona];
                const n = conteos[p + '-' + i] || 0;
                const puedeClic = n > 0 && !!alClicCelda;
                return (
                  <button key={i} type="button" disabled={!puedeClic}
                    onClick={() => puedeClic && alClicCelda(p, i)}
                    className={'celda-mapa flex flex-1 items-center justify-center rounded font-bold ' + altoCelda + (puedeClic ? '' : ' cursor-default')}
                    style={{ backgroundColor: z.color, opacity: n ? 1 : 0.25, color: z.textoOscuro ? '#1E293B' : '#FFFFFF' }}
                    aria-label={'Probabilidad ' + NIVELES_PROBABILIDAD_DEFAULT[p - 1].etiqueta + ' por impacto ' + NIVELES_IMPACTO_DEFAULT[i - 1].etiqueta + ': ' + n + ' riesgo(s), zona ' + zona}>
                    {n ? (grande ? n : (n > 9 ? '9+' : n)) : ''}
                  </button>
                );
              })}
            </div>
          ))}
          <div className="flex gap-1">
            <div className={anchoEje + ' shrink-0'}></div>
            {[1, 2, 3, 4, 5].map(i => (
              <div key={i} className="flex-1 text-center leading-tight">
                <span className="font-bold text-slate-600 dark:text-slate-300">{i}</span>
                {grande && <span className="hidden text-slate-400 sm:block">{NIVELES_IMPACTO_DEFAULT[i - 1].etiqueta}</span>}
              </div>
            ))}
          </div>
          <p className="mt-1 select-none text-center text-[10px] font-bold uppercase tracking-widest text-slate-400">Impacto</p>
        </div>
      </div>
    </div>
  );
};

  const conteosZona = {};

    const { p, i } = posicionRiesgo(r, vista);
    const zona = zonaDe(p, i);
    conteosZona[zona] = (conteosZona[zona] || 0) + 1;
  });

  return (
    <div className="animar-subir space-y-5">
      <section className="rounded-xl border border-slate-200 bg-white p-4 sm:p-5 dark:border-slate-700 dark:bg-slate-900">

    }
    if (f.proceso && r.proceso !== f.proceso) return false;
    if (f.tipo && r.tipo !== f.tipo) return false;

    if (!archivo) return;
    setImportando(true);
    try {
      const { listos, omitidos } = await leerImportacion(archivo, entidad, riesgosCalc.map(r => r.codigo));
      const ahora = new Date().toISOString();
      for (const r of listos) {
        await DB.crearRiesgo({ ...r, entidadId: entidad.id, creadoEn: ahora, actualizadoEn: ahora, creadoPor: usuario.usuario });

          avisar('Riesgo ' + r.codigo + ' eliminado');

/* Formatea porcentajes al estilo es-CO (coma decimal) */
const pctCO = (n) => String(n).replace('.', ',') + '%';

/* --- Formulario de creación / edición del riesgo --- */
const ModalRiesgo = ({ props, alCerrar, ctx }) => {
  const original = props.riesgoId ? ctx.riesgosCalc.find(r => r.id === props.riesgoId) : null;
  const [b, setB] = useState(() => original ? clonar(original) : {
    codigo: siguienteCodigo(ctx.riesgosCalc, ctx.entidad.sigla),
    proceso: (ctx.entidad.procesos || [])[0] || '',
    tipo: 'Gestión', nombre: '', causas: '', consecuencias: '',
    probabilidad: 3, impacto: 3, controles: [], tratamiento: 'Reducir (mitigar)',
    responsable: '', plan: [], estado: 'Activo'
  });
  const [error, setError] = useState('');
  const [guardando, setGuardando] = useState(false);
  const calc = useMemo(() => calcularResidual(b), [b]);
  const pon = (k) => (e) => setB(prev => ({ ...prev, [k]: e.target.value }));

  const cambiarTipo = (e) => {
    const tipo = e.target.value;
    setB(prev => ({
      ...prev, tipo,
      impacto: tipo === 'Corrupción' ? Math.max(+prev.impacto || 1, 3) : prev.impacto,
      tratamiento: tratamientosPara(tipo).includes(prev.tratamiento) ? prev.tratamiento : 'Reducir (mitigar)'
    }));
  };

  const editarControl = (control, indice) => ctx.abrirModal({
    tipo: 'control',
    props: {
      control, indice,
      alGuardar: (ctrl, idx) => setB(prev => {
        const cs = [...(prev.controles || [])];
        if (idx === null || idx === undefined) cs.push(ctrl); else cs[idx] = ctrl;
        return { ...prev, controles: cs };
      })
    }
  });
  const quitarControl = (idx) => setB(prev => ({ ...prev, controles: prev.controles.filter((_, i) => i !== idx) }));

  const ponAccion = (idx, k, v) => setB(prev => {
    const plan = [...(prev.plan || [])]; plan[idx] = { ...plan[idx], [k]: v };
    return { ...prev, plan };
  });
  const agregarAccion = () => setB(prev => ({ ...prev, plan: [...(prev.plan || []), { descripcion: '', responsable: '', fecha: '', estado: 'Pendiente' }] }));
  const quitarAccion = (idx) => setB(prev => ({ ...prev, plan: prev.plan.filter((_, i) => i !== idx) }));

  const guardar = async () => {
    const codigo = String(b.codigo || '').trim().toUpperCase();
    if (!codigo) { setError('El código es obligatorio.'); return; }
    if (!b.proceso) { setError('Selecciona el proceso.'); return; }
    if (!String(b.nombre || '').trim()) { setError('Describe el riesgo.'); return; }
    if (ctx.riesgosCalc.some(r => r.codigo === codigo && r.id !== props.riesgoId)) {
      setError('Ya existe un riesgo con el código ' + codigo + '.'); return;
    }
    setGuardando(true); setError('');
    const comunes = {
      codigo, proceso: b.proceso, tipo: b.tipo, nombre: String(b.nombre).trim(),
      causas: b.causas || '', consecuencias: b.consecuencias || '',
      probabilidad: +b.probabilidad || 1, impacto: +b.impacto || 1,
      controles: b.controles || [], tratamiento: b.tratamiento || '',
      responsable: b.responsable || '', estado: b.estado || 'Activo',
      plan: (b.plan || []).filter(a => String(a.descripcion || '').trim()),
      actualizadoEn: new Date().toISOString()
    };
    try {
      if (original) {
        await DB.actualizarRiesgo(original.id, comunes);
        ctx.registrar('Actualizó el riesgo', codigo, resumirCambios(original, comunes));
        ctx.avisar('Riesgo ' + codigo + ' actualizado');
      } else {
        await DB.crearRiesgo({
          ...comunes, entidadId: ctx.entidad.id, seguimientos: [],
          creadoEn: comunes.actualizadoEn, creadoPor: ctx.usuario.usuario
        });
        ctx.registrar('Creó el riesgo', codigo, comunes.nombre.slice(0, 90));
        ctx.avisar('Riesgo ' + codigo + ' creado');
      }
      alCerrar();
    } catch (e) {
      console.error(e);
      setError('No fue posible guardar. Revisa la conexión e intenta de nuevo.');
      setGuardando(false);
    }
  };

  return (
    <Ventana ancho="max-w-3xl" alCerrar={alCerrar}
      titulo={original ? 'Editar riesgo ' + original.codigo : 'Nuevo riesgo'}
      subtitulo={ctx.entidad.nombre}
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar} disabled={guardando}>
          {guardando ? 'Guardando…' : (original ? 'Guardar cambios' : 'Crear riesgo')}
        </button>
      </>}>
      <div className="space-y-6">

        <section className="space-y-3">
          <TituloSeccion>Identificación</TituloSeccion>
          <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
            <div>
              <label htmlFor="r-codigo" className={CLS_ETIQUETA}>Código</label>
              <input id="r-codigo" className={CLS_INPUT + ' font-semibold uppercase'} value={b.codigo} onChange={pon('codigo')} />
            </div>
            <div>
              <label htmlFor="r-proceso" className={CLS_ETIQUETA}>Proceso</label>
              <select id="r-proceso" className={CLS_INPUT} value={b.proceso} onChange={pon('proceso')}>
                {!b.proceso && <option value="">Selecciona…</option>}
                {(ctx.entidad.procesos || []).map(p => <option key={p} value={p}>{p}</option>)}
                {b.proceso && !(ctx.entidad.procesos || []).includes(b.proceso) && <option value={b.proceso}>{b.proceso}</option>}
              </select>
            </div>
            <div>
              <label htmlFor="r-tipo" className={CLS_ETIQUETA}>Tipo de riesgo</label>
              <select id="r-tipo" className={CLS_INPUT} value={b.tipo} onChange={cambiarTipo}>
                {TIPOS_RIESGO.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
          {original && (
            <div className="sm:w-1/3">
              <label htmlFor="r-estado" className={CLS_ETIQUETA}>Estado</label>
              <select id="r-estado" className={CLS_INPUT} value={b.estado} onChange={pon('estado')}>
                {ESTADOS_RIESGO.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          )}
        </section>

        <section className="space-y-3">
          <TituloSeccion>Descripción</TituloSeccion>
          <div>
            <label htmlFor="r-nombre" className={CLS_ETIQUETA}>Riesgo (posible evento y su efecto)</label>
            <textarea id="r-nombre" rows="2" className={CLS_INPUT} value={b.nombre} onChange={pon('nombre')}
              placeholder="Ej.: Vencimiento de los términos legales para responder PQRSD" />
          </div>
          <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <div>
              <label htmlFor="r-causas" className={CLS_ETIQUETA}>Causas (una por línea)</label>
              <textarea id="r-causas" rows="3" className={CLS_INPUT} value={b.causas} onChange={pon('causas')} />
            </div>
            <div>
              <label htmlFor="r-consec" className={CLS_ETIQUETA}>Consecuencias (una por línea)</label>
              <textarea id="r-consec" rows="3" className={CLS_INPUT} value={b.consecuencias} onChange={pon('consecuencias')} />
            </div>
          </div>
        </section>

        <section className="space-y-3">
          <TituloSeccion>Análisis inherente</TituloSeccion>
          <div className="grid grid-cols-1 gap-3 sm:grid-cols-[1fr,1fr,auto]">
            <div>
              <label htmlFor="r-prob" className={CLS_ETIQUETA}>Probabilidad</label>
              <select id="r-prob" className={CLS_INPUT} value={b.probabilidad} onChange={pon('probabilidad')}>
                {NIVELES_PROBABILIDAD_DEFAULT.map(n => (
                  <option key={n.nivel} value={n.nivel}>{n.nivel} · {n.etiqueta} ({n.pct}%) — {n.criterio}</option>
                ))}
              </select>
            </div>
            <div>
              <label htmlFor="r-imp" className={CLS_ETIQUETA}>Impacto</label>
              <select id="r-imp" className={CLS_INPUT} value={b.impacto} onChange={pon('impacto')}>
                {NIVELES_IMPACTO_DEFAULT.map(n => (
                  <option key={n.nivel} value={n.nivel} disabled={b.tipo === 'Corrupción' && n.nivel < 3}>
                    {n.nivel} · {n.etiqueta} ({n.pct}%)
                  </option>
                ))}
              </select>
              {b.tipo === 'Corrupción' && (
                <p className="mt-1 text-[11px] text-amber-700 dark:text-amber-400">En riesgos de corrupción el impacto mínimo es Moderado (guía DAFP).</p>
              )}
            </div>
            <div className="flex min-w-[130px] flex-col items-center justify-center gap-1 rounded-lg bg-slate-50 p-3 dark:bg-slate-800/60">
              <span className="text-[10px] font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Zona inherente</span>
              <ChipZona zona={calc.zonaInherente} grande />
            </div>
          </div>
        </section>

        <section className="space-y-3">
          <div className="flex items-center justify-between gap-2">
            <TituloSeccion>Controles existentes</TituloSeccion>
            <button className={CLS_BOTON_SECUNDARIO} onClick={() => editarControl(null, null)}><IcoMas /> Agregar control</button>
          </div>
          {(b.controles || []).length === 0 ? (
            <p className="rounded-lg border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500 dark:border-slate-600 dark:text-slate-400">
              Sin controles: el riesgo residual será igual al inherente.
            </p>
          ) : (
            <ul className="space-y-2">
              {b.controles.map((c, idx) => (
                <li key={idx} className="flex items-start gap-3 rounded-lg border border-slate-200 p-3 dark:border-slate-700">
                  <span className="mt-0.5 inline-flex h-7 w-12 shrink-0 items-center justify-center rounded bg-tinta-tenue text-xs font-bold text-tinta dark:bg-slate-700 dark:text-slate-200">
                    {valoracionControl(c)}%
                  </span>
                  <span className="min-w-0 flex-1">
                    <span className="block text-sm font-medium text-slate-700 dark:text-slate-200">{c.descripcion}</span>
                    <span className="mt-0.5 block text-[11px] text-slate-500 dark:text-slate-400">
                      {c.tipo} · {c.implementacion} · reduce {(TIPOS_CONTROL[c.tipo] || {}).afecta}
                      {c.responsable ? ' · ' + c.responsable : ''}
                    </span>
                  </span>
                  <span className="flex shrink-0 gap-0.5">
                    <button className="rounded p-1.5 text-slate-500 hover:bg-slate-100 hover:text-tinta dark:hover:bg-slate-800"
                      aria-label="Editar control" onClick={() => editarControl(c, idx)}><IcoLapiz /></button>
                    <button className="rounded p-1.5 text-slate-500 hover:bg-slate-100 hover:text-red-700 dark:hover:bg-slate-800"
                      aria-label="Quitar control" onClick={() => quitarControl(idx)}><IcoBasura /></button>
                  </span>
                </li>
              ))}
            </ul>
          )}
        </section>

        <section className="rounded-lg border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-800/60">
          <div className="flex flex-wrap items-center justify-between gap-4">
            <div className="min-w-[220px] flex-1 space-y-1 text-sm text-slate-700 dark:text-slate-200">
              <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Cálculo del riesgo residual</p>
              <p>Probabilidad: {pctCO(calc.pInh)} → <strong>{pctCO(calc.pPct)}</strong> · nivel {calc.pRes} ({NIVELES_PROBABILIDAD_DEFAULT[calc.pRes - 1].etiqueta})</p>
              <p>Impacto: {pctCO(calc.iInh)} → <strong>{pctCO(calc.iPct)}</strong> · nivel {calc.iRes} ({NIVELES_IMPACTO_DEFAULT[calc.iRes - 1].etiqueta})</p>
              <p className="text-xs text-slate-500 dark:text-slate-400">
                {(b.controles || []).length} control(es) aplicados en cadena según la guía DAFP.
              </p>
              {calc.impactoAjustado && (
                <p className="flex items-center gap-1.5 text-xs font-medium text-amber-700 dark:text-amber-400">
                  <IcoAlerta className="h-3.5 w-3.5" /> Corrupción: el impacto residual no baja de Moderado.
                </p>
              )}
            </div>
            <div className="flex flex-col items-center gap-1">
              <span className="text-[10px] font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Zona residual</span>
              <ChipZona zona={calc.zonaResidual} grande />
            </div>
          </div>
        </section>

        <section className="space-y-3">
          <TituloSeccion>Tratamiento y plan de acción</TituloSeccion>
          <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <div>
              <label htmlFor="r-trat" className={CLS_ETIQUETA}>Tratamiento</label>
              <select id="r-trat" className={CLS_INPUT} value={b.tratamiento} onChange={pon('tratamiento')}>
                {tratamientosPara(b.tipo).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label htmlFor="r-resp" className={CLS_ETIQUETA}>Responsable del riesgo</label>
              <input id="r-resp" className={CLS_INPUT} value={b.responsable} onChange={pon('responsable')} placeholder="Cargo o dependencia" />
            </div>
          </div>

          <div className="space-y-2">
            {(b.plan || []).map((a, idx) => (
              <div key={idx} className="flex flex-wrap items-center gap-2 rounded-lg border border-slate-200 p-2 dark:border-slate-700">
                <input aria-label="Descripción de la acción" placeholder="Acción del plan…"
                  className={CLS_INPUT + ' min-w-[180px] flex-1'} value={a.descripcion}
                  onChange={e => ponAccion(idx, 'descripcion', e.target.value)} />
                <input aria-label="Responsable de la acción" placeholder="Responsable"
                  className={CLS_INPUT + ' w-36'} value={a.responsable}
                  onChange={e => ponAccion(idx, 'responsable', e.target.value)} />
                <input aria-label="Fecha límite" type="date"
                  className={CLS_INPUT + ' w-40 ' + (accionVencida(a) ? 'border-red-400 text-red-700 dark:text-red-400' : '')}
                  value={a.fecha} onChange={e => ponAccion(idx, 'fecha', e.target.value)} />
                <select aria-label="Estado de la acción" className={CLS_INPUT + ' w-32'} value={a.estado}
                  onChange={e => ponAccion(idx, 'estado', e.target.value)}>
                  {ESTADOS_ACCION.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <button className="rounded p-1.5 text-slate-500 hover:bg-slate-100 hover:text-red-700 dark:hover:bg-slate-800"
                  aria-label="Quitar acción" onClick={() => quitarAccion(idx)}><IcoBasura /></button>
              </div>
            ))}
            <button className={CLS_BOTON_SECUNDARIO} onClick={agregarAccion}><IcoMas /> Agregar acción</button>
          </div>
        </section>
      </div>
    </Ventana>
  );
};

/* --- Formulario del control (se apila sobre el formulario del riesgo) --- */
const ModalControl = ({ props, alCerrar }) => {
  const [c, setC] = useState(() => props.control ? clonar(props.control) : {
    descripcion: '', tipo: 'Preventivo', implementacion: 'Manual',
    responsable: '', documentacion: 'Documentado', frecuencia: 'Continua', evidencia: 'Con registro'
  });
  const [error, setError] = useState('');
  const uid = useRef('ctl' + Math.random().toString(36).slice(2)).current;
  const pon = (k, v) => setC(prev => ({ ...prev, [k]: v }));

  const guardar = () => {
    if (!String(c.descripcion || '').trim()) { setError('Describe el control.'); return; }
    props.alGuardar({ ...c, descripcion: String(c.descripcion).trim() },
      props.indice === undefined ? null : props.indice);
    alCerrar();
  };

  const claseOpcion = (activa) => 'flex cursor-pointer items-start gap-2 rounded-lg border p-2.5 transition-colors ' +
    (activa ? 'border-tinta bg-tinta-tenue dark:border-tinta-claro dark:bg-slate-800'
            : 'border-slate-200 hover:border-slate-300 dark:border-slate-700');

  return (
    <Ventana titulo={props.control ? 'Editar control' : 'Agregar control'} ancho="max-w-xl" alCerrar={alCerrar}
      subtitulo="Atributos de eficiencia según la guía DAFP"
      pie={<>
        {error && <p className="mr-auto self-center text-sm font-medium text-red-700 dark:text-red-400" role="alert">{error}</p>}
        <button className={CLS_BOTON_SECUNDARIO} onClick={alCerrar}>Cancelar</button>
        <button className={CLS_BOTON_PRIMARIO} onClick={guardar}>Guardar control</button>
      </>}>
      <div className="space-y-4">
        <div>
          <label htmlFor={uid + '-desc'} className={CLS_ETIQUETA}>Descripción del control</label>
          <textarea id={uid + '-desc'} rows="2" className={CLS_INPUT} value={c.descripcion} autoFocus
            onChange={e => pon('descripcion', e.target.value)}
            placeholder="Ej.: Conciliaciones bancarias mensuales con acta firmada" />
        </div>

        <div>
          <span className={CLS_ETIQUETA}>Tipo de control</span>
          <div className="grid grid-cols-1 gap-2 sm:grid-cols-3" role="radiogroup" aria-label="Tipo de control">
            {Object.entries(TIPOS_CONTROL).map(([nombre, t]) => (
              <label key={nombre} className={claseOpcion(c.tipo === nombre)}>
                <input type="radio" name={uid + '-tipo'} className="mt-1" checked={c.tipo === nombre} onChange={() => pon('tipo', nombre)} />
                <span>
                  <span className="block text-sm font-semibold text-slate-700 dark:text-slate-200">{nombre} · {t.pct}%</span>
                  <span className="text-[11px] text-slate-500 dark:text-slate-400">Reduce la {t.afecta === 'impacto' ? 'severidad del impacto' : 'probabilidad'}</span>
                </span>
              </label>
            ))}
          </div>
        </div>

        <div>
          <span className={CLS_ETIQUETA}>Implementación</span>
          <div className="grid grid-cols-1 gap-2 sm:grid-cols-2" role="radiogroup" aria-label="Implementación del control">
            {Object.entries(IMPLEMENTACION_CONTROL).map(([nombre, pct]) => (
              <label key={nombre} className={claseOpcion(c.implementacion === nombre)}>
                <input type="radio" name={uid + '-impl'} className="mt-1" checked={c.implementacion === nombre} onChange={() => pon('implementacion', nombre)} />
                <span>
                  <span className="block text-sm font-semibold text-slate-700 dark:text-slate-200">{nombre} · {pct}%</span>
                  <span className="text-[11px] text-slate-500 dark:text-slate-400">{nombre === 'Automático' ? 'Lo ejecuta un sistema' : 'Lo ejecuta una persona'}</span>
                </span>
              </label>
            ))}
          </div>
        </div>

        <div>
          <label htmlFor={uid + '-resp'} className={CLS_ETIQUETA}>Responsable del control</label>
          <input id={uid + '-resp'} className={CLS_INPUT} value={c.responsable} onChange={e => pon('responsable', e.target.value)} placeholder="Cargo o rol que lo ejecuta" />
        </div>

        <div>
          <span className={CLS_ETIQUETA}>Atributos informativos (no puntúan)</span>
          <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
            <select aria-label="Documentación" className={CLS_INPUT} value={c.documentacion} onChange={e => pon('documentacion', e.target.value)}>
              {['Documentado', 'Sin documentar'].map(o => <option key={o} value={o}>{o}</option>)}
            </select>
            <select aria-label="Frecuencia" className={CLS_INPUT} value={c.frecuencia} onChange={e => pon('frecuencia', e.target.value)}>
              {['Continua', 'Aleatoria'].map(o => <option key={o} value={o}>{o}</option>)}
            </select>
            <select aria-label="Evidencia" className={CLS_INPUT} value={c.evidencia} onChange={e => pon('evidencia', e.target.value)}>
              {['Con registro', 'Sin registro'].map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        </div>

        <p className="rounded-lg bg-slate-50 px-3 py-2 text-sm font-medium text-slate-700 dark:bg-slate-800 dark:text-slate-200">
          Valoración del control: <strong>{valoracionControl(c)}%</strong> — reduce la {(TIPOS_CONTROL[c.tipo] || {}).afecta === 'impacto' ? 'severidad del impacto' : 'probabilidad'}.
        </p>
      </div>
    </Ventana>
  );
};

/* --- Detalle del riesgo (solo lectura) --- */
const ModalVer = ({ props, alCerrar, ctx }) => {
  const r = ctx.riesgosCalc.find(x => x.id === props.riesgoId);

    if (!e.target.open || historial || !r) return;
    try {
      const todos = await DB.listarHistorial(ctx.entidad.id, 300);
      setHistorial(todos.filter(h => h.riesgoCodigo === r.codigo).slice(0, 20));
    } catch (err) { console.error(err); setHistorial([]); }

    return (
      <Ventana titulo="Riesgo no disponible" ancho="max-w-md" alCerrar={alCerrar}

        <p className="text-sm text-slate-600 dark:text-slate-300">El riesgo ya no existe o fue eliminado por otra persona.</p>
      </Ventana>
    );

          {[['Causas', r.causas], ['Consecuencias', r.consecuencias]].map(([titulo, texto]) => (

              <h4 className="mb-1 text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">{titulo}</h4>

                <ul className="list-disc space-y-0.5 pl-4 text-sm text-slate-600 dark:text-slate-300">
                  {enLineas(texto).map((l, i) => <li key={i}>{l}</li>)}
                </ul>

        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div className="rounded-lg border border-slate-200 p-3 dark:border-slate-700">
            <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Riesgo inherente</p>
            <div className="mt-2 flex items-center justify-between gap-2">
              <span className="text-xs text-slate-600 dark:text-slate-300">
                P{r.probabilidad} · {NIVELES_PROBABILIDAD_DEFAULT[r.probabilidad - 1].etiqueta}<br />
                I{r.impacto} · {NIVELES_IMPACTO_DEFAULT[r.impacto - 1].etiqueta}
              </span>
              <ChipZona zona={r.calc.zonaInherente} grande />
            </div>

          <div className="rounded-lg border border-slate-200 bg-slate-50 p-3 dark:border-slate-700 dark:bg-slate-800/60">
            <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Riesgo residual</p>
            <div className="mt-2 flex items-center justify-between gap-2">
              <span className="text-xs text-slate-600 dark:text-slate-300">
                P{r.calc.pRes} ({pctCO(r.calc.pPct)})<br />
                I{r.calc.iRes} ({pctCO(r.calc.iPct)})
              </span>
              <ChipZona zona={r.calc.zonaResidual} grande />
            </div>
            {r.calc.impactoAjustado && (
              <p className="mt-2 text-[11px] text-amber-700 dark:text-amber-400">Impacto ajustado al mínimo de corrupción (Moderado).</p>

        </div>

        <div>
          <h4 className="mb-2 text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">
            Controles ({(r.controles || []).length}) · Tratamiento: {r.tratamiento || '—'}
          </h4>
          {(r.controles || []).length ? (
            <ul className="space-y-1.5">

                  <span className="mt-0.5 inline-flex h-6 w-11 shrink-0 items-center justify-center rounded bg-tinta-tenue text-[11px] font-bold text-tinta dark:bg-slate-700 dark:text-slate-200">{valoracionControl(c)}%</span>
                  <span className="text-slate-600 dark:text-slate-300">
                    {c.descripcion}
                    <span className="text-slate-400"> — {c.tipo}, {c.implementacion}{c.responsable ? ', ' + c.responsable : ''}</span>

                </li>
              ))}
